<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Reset Password" data-sk="Reset hesla">Reset Password</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #40ffaa, #4079ff, #40ffaa, #4079ff);
            --input-bg: #f8f9fa;
            --text-color: #333;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            perspective: 1000px;
            overflow-x: hidden;
        }

        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            color: rgba(64, 121, 255, 0.1);
            font-weight: bold;
            user-select: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            margin: 1rem;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            opacity: 0;
            transform: translateY(30px);
            animation: containerPop 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes containerPop {
            to { opacity: 1; transform: translateY(0) rotateX(0) rotateY(0); }
        }

        .animate-item {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .animate-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .language-switcher {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 10;
        }
        
        .lang-btn {
            padding: 0.4rem 0.8rem;
            background-color: transparent;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            font-weight: bold;
            color: #888;
        }
        
        .lang-btn.active {
            background-color: #4079ff;
            color: white;
            border-color: #4079ff;
            box-shadow: 0 4px 10px rgba(64, 121, 255, 0.3);
        }

        .icon-wrapper {
            text-align: center;
            margin-bottom: 0.5rem;
            margin-top: 1rem;
        }

        .icon-wrapper svg {
            width: 56px;
            height: 56px;
        }
        
        h1 {
            background: var(--primary-gradient);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            text-align: center;
            margin-bottom: 0.5rem;
            margin-top: 0.5rem;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 4px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid transparent;
            background-color: var(--input-bg);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        input[type="password"]:focus {
            background-color: white;
            border-color: #4079ff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(64, 121, 255, 0.1);
        }

        /* Sila hesla */
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            margin-top: 8px;
            background: #eee;
            transition: all 0.3s;
            overflow: hidden;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 4px;
            margin-left: 4px;
            color: #888;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            background-size: 200% auto;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(64, 121, 255, 0.3);
        }
        
        button[type="submit"]:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(64, 121, 255, 0.4);
        }

        button[type="submit"]:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .success {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        /* Neplatný token */
        .invalid-token {
            text-align: center;
            padding: 1rem 0;
        }

        .invalid-token p {
            color: #888;
            margin-bottom: 1.5rem;
        }
        
        .register-link {
            text-align: center;
            margin-top: 2rem;
            color: #666;
            font-size: 0.95rem;
        }
        
        .register-link a, .home-button a {
            color: #4079ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .register-link a:hover, .home-button a:hover {
            color: #2e5bbf;
            text-decoration: underline;
        }

        .home-button {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
                width: 95%;
                transform: none !important;
            }
            h1 { font-size: 1.8rem; }
            .language-switcher {
                position: static;
                margin-bottom: 1.5rem;
                display: flex;
                justify-content: center;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-shapes" id="bgShapes"></div>

    <div class="login-container" id="card">
        <div class="language-switcher animate-item">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sk">SK</button>
        </div>

        <div class="icon-wrapper animate-item">
            <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="28" cy="28" r="28" fill="url(#iconGrad2)"/>
                <path d="M28 16a6 6 0 0 1 6 6v1h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H20a2 2 0 0 1-2-2V25a2 2 0 0 1 2-2h2v-1a6 6 0 0 1 6-6zm0 4a2 2 0 0 0-2 2v1h4v-1a2 2 0 0 0-2-2zm0 8a2 2 0 1 0 0 4 2 2 0 0 0 0-4z" fill="white"/>
                <path d="M36 20l4-4m0 0l2 2m-2-2l2-2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                <defs>
                    <linearGradient id="iconGrad2" x1="0" y1="0" x2="56" y2="56">
                        <stop offset="0%" stop-color="#40ffaa"/>
                        <stop offset="100%" stop-color="#4079ff"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        
        <h1 class="animate-item" data-en="New Password" data-sk="Nové heslo">New Password</h1>

        <p class="subtitle animate-item"
           data-en="Choose a strong new password for your account."
           data-sk="Zvoľte silné nové heslo pre váš účet.">
            Choose a strong new password for your account.
        </p>

        <div id="formWrapper">
            <form id="resetForm" class="animate-item">
                <div class="form-group">
                    <label for="password" data-en="New Password" data-sk="Nové heslo">New Password</label>
                    <input type="password" id="password" name="password" required
                           data-en-placeholder="Min. 8 characters"
                           data-sk-placeholder="Min. 8 znakov"
                           placeholder="Min. 8 characters">
                    <div class="strength-bar"><div class="strength-bar-fill" id="strengthFill"></div></div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                <div class="form-group">
                    <label for="password2" data-en="Confirm Password" data-sk="Potvrďte heslo">Confirm Password</label>
                    <input type="password" id="password2" name="password2" required
                           data-en-placeholder="Repeat password"
                           data-sk-placeholder="Zopakujte heslo"
                           placeholder="Repeat password">
                </div>
                <button type="submit" data-en="Set New Password" data-sk="Nastaviť heslo">Set New Password</button>
            </form>
        </div>

        <div id="message"></div>
        
        <div class="register-link animate-item">
            <a href="/login" data-en="← Back to Login" data-sk="← Späť na prihlásenie">← Back to Login</a>
        </div>
        
        <div class="home-button animate-item">
            <a href="/" data-en="← Back to Homepage" data-sk="← Späť na domovskú stránku">← Back to Homepage</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Staggered animation
            const animatedItems = document.querySelectorAll('.animate-item');
            animatedItems.forEach((item, index) => {
                setTimeout(() => item.classList.add('visible'), 200 + (index * 100));
            });

            // 3D Tilt
            const card = document.getElementById('card');
            if (window.matchMedia("(hover: hover)").matches) {
                document.body.addEventListener('mousemove', (e) => {
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });
                document.body.addEventListener('mouseleave', () => {
                    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                    card.style.transition = "transform 0.5s ease";
                });
                document.body.addEventListener('mouseenter', () => {
                    card.style.transition = "none";
                });
            }

            // Background shapes
            const bgContainer = document.getElementById('bgShapes');
            const characters = ['🔒', '✓', '★', '#', '@', '!', 'A', 'B', 'C', '?'];
            function createShape() {
                const shape = document.createElement('div');
                shape.classList.add('shape');
                shape.innerText = characters[Math.floor(Math.random() * characters.length)];
                const size = Math.random() * 30 + 10;
                shape.style.fontSize = `${size}px`;
                shape.style.left = `${Math.random() * 100}vw`;
                const duration = Math.random() * 10 + 10;
                shape.style.animationDuration = `${duration}s`;
                bgContainer.appendChild(shape);
                setTimeout(() => shape.remove(), duration * 1000);
            }
            for (let i = 0; i < 15; i++) setTimeout(createShape, i * 500);
            setInterval(createShape, 1000);

            // Language switcher
            const langButtons = document.querySelectorAll('.lang-btn');
            const currentLang = localStorage.getItem('preferredLang') || 'en';
            setActiveLanguage(currentLang);

            langButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    setActiveLanguage(lang);
                    localStorage.setItem('preferredLang', lang);
                });
            });

            function setActiveLanguage(lang) {
                langButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
                });
                document.querySelectorAll('[data-en], [data-sk]').forEach(element => {
                    if (element.hasAttribute(`data-${lang}`)) {
                        const text = element.getAttribute(`data-${lang}`);
                        if (element.tagName === 'TITLE') document.title = text;
                        else element.textContent = text;
                    }
                });
                document.querySelectorAll('[data-en-placeholder], [data-sk-placeholder]').forEach(element => {
                    if (element.hasAttribute(`data-${lang}-placeholder`)) {
                        element.placeholder = element.getAttribute(`data-${lang}-placeholder`);
                    }
                });
            }

            // Token z URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                document.getElementById('formWrapper').innerHTML = `
                    <div class="invalid-token animate-item visible">
                        <p data-en="Invalid or missing reset token. Please request a new reset link." 
                           data-sk="Neplatný alebo chýbajúci token. Požiadajte o nový odkaz.">
                            Invalid or missing reset token. Please request a new reset link.
                        </p>
                        <a href="/forgot-password" style="color:#4079ff;font-weight:600;text-decoration:none;" 
                           data-en="Request new link" data-sk="Požiadať o nový odkaz">Request new link</a>
                    </div>`;
                return;
            }

            // Sila hesla
            const passwordInput = document.getElementById('password');
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');

            passwordInput.addEventListener('input', function() {
                const val = this.value;
                const lang = localStorage.getItem('preferredLang') || 'en';
                let score = 0;
                if (val.length >= 8) score++;
                if (/[A-Z]/.test(val)) score++;
                if (/[0-9]/.test(val)) score++;
                if (/[^A-Za-z0-9]/.test(val)) score++;

                const levels = {
                    en: ['', 'Weak', 'Fair', 'Good', 'Strong'],
                    sk: ['', 'Slabé', 'Primerané', 'Dobré', 'Silné']
                };
                const colors = ['', '#e74c3c', '#f39c12', '#3498db', '#2ecc71'];

                strengthFill.style.width = `${score * 25}%`;
                strengthFill.style.background = colors[score] || '#eee';
                strengthText.textContent = score > 0 ? (levels[lang][score] || '') : '';
                strengthText.style.color = colors[score] || '#888';
            });

            // Form handler
            const form = document.getElementById('resetForm');
            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                const currentLang = localStorage.getItem('preferredLang') || 'en';
                const password = document.getElementById('password').value;
                const password2 = document.getElementById('password2').value;

                if (password.length < 8) {
                    showMessage(currentLang === 'sk' ? 'Heslo musí mať aspoň 8 znakov.' : 'Password must be at least 8 characters.', 'error');
                    return;
                }

                if (password !== password2) {
                    showMessage(currentLang === 'sk' ? 'Heslá sa nezhodujú.' : 'Passwords do not match.', 'error');
                    return;
                }

                const submitButton = form.querySelector('button[type="submit"]');
                const originalBtnText = submitButton.textContent;
                submitButton.disabled = true;
                submitButton.textContent = currentLang === 'sk' ? 'Ukladám...' : 'Saving...';

                try {
                    const response = await fetch('/api/v1/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showMessage(
                            currentLang === 'sk' ? 'Heslo bolo zmenené! Presmerovávam...' : 'Password changed! Redirecting...',
                            'success'
                        );
                        form.style.display = 'none';
                        setTimeout(() => window.location.href = '/login', 2000);
                    } else {
                        throw new Error(data.detail || 'Error');
                    }
                } catch (error) {
                    showMessage(
                        currentLang === 'sk'
                            ? 'Token je neplatný alebo vypršal. Požiadajte o nový odkaz.'
                            : 'Token is invalid or expired. Please request a new link.',
                        'error'
                    );
                    submitButton.disabled = false;
                    submitButton.textContent = originalBtnText;
                }
            });
        });

        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 6000);
        }
    </script>
</body>
</html>
