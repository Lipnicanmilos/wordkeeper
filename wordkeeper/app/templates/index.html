<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Welcome" data-sk="Vitajte">Welcome</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #40ffaa, #4079ff, #40ffaa, #4079ff);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* Pozadie s plávajúcimi prvkami */
        .background-shapes {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            color: rgba(64, 121, 255, 0.1);
            font-weight: bold;
            user-select: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            position: relative;
            box-sizing: border-box;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            opacity: 0;
            transform: translateY(30px);
            animation: containerPop 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Kontajner pre tvoj obrázok static/img/index.jpg */
        .hero-container {
            position: relative;
            width: 100%;
            margin-bottom: 1.5rem;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            background: #000; /* Pozadie pod obrázkom */
        }

        .hero-container img {
            width: 100%;
            display: block;
            opacity: 0.9; /* Jemné stmavenie pre lepšiu čitateľnosť textu */
        }

        /* Dynamický text priamo nad obrázkom */
        .hero-overlay-text {
            position: absolute;
            top: 15%; /* Pozícia textu na obrázku */
            left: 0;
            width: 100%;
            color: #40ffaa;
            font-weight: 800;
            font-size: 1.8rem;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 2;
        }

        @keyframes containerPop {
            to { opacity: 1; transform: translateY(0) rotateX(0) rotateY(0); }
        }

        .animate-item {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .animate-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .animated-gradient-text {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .text-content {
            background: var(--primary-gradient);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            font-size: 2.3rem;
            font-weight: 800;
            margin: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .auth-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .auth-link {
            padding: 0.8rem 1.8rem;
            background: #4079ff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .auth-link:nth-child(2) {
            background: white;
            color: #4079ff;
            border: 2px solid #4079ff;
        }

        .auth-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(64, 121, 255, 0.3);
        }

        .language-switcher {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 10;
        }

        .lang-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #4079ff;
            color: white;
            border-color: #4079ff;
            box-shadow: 0 2px 5px rgba(64, 121, 255, 0.3);
        }

        .features-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 1.5rem;
        }

        .features-list div { width: 100%; max-width: 250px; }

        .features-list li {
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            color: #444;
            font-weight: 500;
        }

        .features-list i {
            margin-right: 0.8rem;
            color: #40ffaa;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            .hero-overlay-text { font-size: 1.2rem; top: 10%; }
            .text-content { font-size: 1.8rem; }
            .container { padding: 2rem 1.5rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="background-shapes" id="bgShapes"></div>

    <div class="container" id="card">
        <div class="language-switcher">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sk">SK</button>
        </div>

        <div class="hero-container animate-item">
            <img src="/static/img/index.jpg" alt="WordKeeper Dashboard">
            
            <div id="heroOverlay" class="hero-overlay-text" 
                 data-en="Master new languages" 
                 data-sk="Ovládnite nové jazyky">
                 Master new languages
            </div>
        </div>
        
        <div class="animated-gradient-text animate-item">
            <h1 class="text-content" data-en="Welcome to WordKeeper" data-sk="Vitajte v WordKeeper">Welcome to WordKeeper</h1>
        </div>
        
        <p class="animate-item" data-en="Your personal vocabulary trainer for effective learning." data-sk="Váš osobný tréner slovíčok pre efektívne učenie.">
            Your personal vocabulary trainer for effective learning.
        </p>
        
        <div class="auth-links animate-item">
            <a href="/login" class="auth-link" data-en="Login" data-sk="Prihlásiť sa">Login</a>
            <a href="/register" class="auth-link" data-en="Register" data-sk="Registrovať sa">Register</a>
        </div>

        <div class="features-list animate-item">
            <div data-lang-container="en">
                <li><i class="fas fa-check-circle"></i> Custom categories</li>
                <li><i class="fas fa-check-circle"></i> Progress tracking</li>
            </div>
            <div data-lang-container="sk" style="display: none;">
                <li><i class="fas fa-check-circle"></i> Vlastné kategórie</li>
                <li><i class="fas fa-check-circle"></i> Sledovanie pokroku</li>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const langButtons = document.querySelectorAll('.lang-btn');
            const heroOverlay = document.getElementById('heroOverlay');

            function setActiveLanguage(lang) {
                // 1. Zmena textu nad obrázkom
                if (heroOverlay) {
                    heroOverlay.textContent = heroOverlay.getAttribute(`data-${lang}`);
                }

                // 2. Preklad všetkých elementov s data-en/sk
                document.querySelectorAll('[data-en], [data-sk]').forEach(el => {
                    const text = el.getAttribute(`data-${lang}`);
                    if (el.tagName === 'TITLE') document.title = text;
                    else el.textContent = text;
                });

                // 3. Prepnutie zoznamu funkcií (features)
                document.querySelectorAll('[data-lang-container]').forEach(c => {
                    c.style.display = c.getAttribute('data-lang-container') === lang ? 'block' : 'none';
                });

                // 4. Aktivácia správneho tlačidla
                langButtons.forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === lang));
            }

            langButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const l = btn.getAttribute('data-lang');
                    setActiveLanguage(l);
                    localStorage.setItem('preferredLang', l);
                });
            });

            // Postupná animácia prvkov pri načítaní
            const items = document.querySelectorAll('.animate-item');
            items.forEach((item, i) => {
                setTimeout(() => item.classList.add('visible'), 200 + (i * 150));
            });

            // Jemný Tilt efekt na kartu pri pohybe myšou
            const card = document.getElementById('card');
            document.body.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 45;
                const y = (window.innerHeight / 2 - e.pageY) / 45;
                card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });

            // Inicializácia jazyka (podľa pamäte alebo predvolená EN)
            setActiveLanguage(localStorage.getItem('preferredLang') || 'en');
            
            // Generovanie plávajúcich písmen na pozadí
            const bg = document.getElementById('bgShapes');
            const chars = ['A', 'B', 'C', '文', 'Ω', 'Σ'];
            setInterval(() => {
                const s = document.createElement('div');
                s.className = 'shape';
                s.innerText = chars[Math.floor(Math.random() * chars.length)];
                s.style.left = Math.random() * 100 + 'vw';
                s.style.fontSize = Math.random() * 25 + 15 + 'px';
                s.style.animationDuration = Math.random() * 7 + 8 + 's';
                bg.appendChild(s);
                setTimeout(() => s.remove(), 15000);
            }, 2500);
        });
    </script>
</body>
</html>
