<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Login" data-sk="Prihlásenie">Login</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #40ffaa, #4079ff, #40ffaa, #4079ff);
            --input-bg: #f8f9fa;
            --text-color: #333;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            perspective: 1000px; /* Pre 3D efekt */
            overflow-x: hidden;
        }

        /* Pozadie s plávajúcimi prvkami */
        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            color: rgba(64, 121, 255, 0.1);
            font-weight: bold;
            user-select: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            margin: 1rem;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            
            /* Vstupná animácia */
            opacity: 0;
            transform: translateY(30px);
            animation: containerPop 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes containerPop {
            to { opacity: 1; transform: translateY(0) rotateX(0) rotateY(0); }
        }

        /* Staggered animácia pre vnútro */
        .animate-item {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .animate-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .language-switcher {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 10;
        }
        
        .lang-btn {
            padding: 0.4rem 0.8rem;
            background-color: transparent;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            font-weight: bold;
            color: #888;
        }
        
        .lang-btn.active {
            background-color: #4079ff;
            color: white;
            border-color: #4079ff;
            box-shadow: 0 4px 10px rgba(64, 121, 255, 0.3);
        }
        
        h1 {
            background: var(--primary-gradient);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            text-align: center;
            margin-bottom: 2rem;
            margin-top: 1rem;
            font-size: 2rem;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 4px;
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid transparent;
            background-color: var(--input-bg);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        input[type="email"]:focus,
        input[type="password"]:focus {
            background-color: white;
            border-color: #4079ff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(64, 121, 255, 0.1);
        }
        
        /* Hlavné tlačidlo Login */
        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            background-size: 200% auto;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(64, 121, 255, 0.3);
        }
        
        button[type="submit"]:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(64, 121, 255, 0.4);
        }

        button[type="submit"]:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Google Button - Moderný vzhľad */
        .social-login {
            margin: 0 0 1.5rem 0;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 0.8rem;
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #444;
            transition: all 0.3s ease;
        }
        
        .google-btn:hover {
            border-color: #4079ff;
            background: #fff;
            color: #4079ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .google-btn img {
            width: 22px;
            height: 22px;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
            color: #888;
            font-size: 0.9rem;
        }

        .divider:before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #eee;
            z-index: 1;
        }

        .divider span {
            background: rgba(255,255,255,0.9); /* Musí ladiť s pozadím karty */
            padding: 0 1rem;
            position: relative;
            z-index: 2;
        }

        #message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .success {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        
        .register-link {
            text-align: center;
            margin-top: 2rem;
            color: #666;
            font-size: 0.95rem;
        }
        
        .register-link a, .home-button a {
            color: #4079ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .register-link a:hover, .home-button a:hover {
            color: #2e5bbf;
            text-decoration: underline;
        }

        .home-button {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
                width: 95%;
                transform: none !important; /* Vypnúť tilt na mobile */
            }
            h1 { font-size: 1.8rem; }
            .language-switcher {
                position: static;
                margin-bottom: 1.5rem;
                display: flex;
                justify-content: center;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-shapes" id="bgShapes"></div>

    <div class="login-container" id="card">
        <div class="language-switcher animate-item">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sk">SK</button>
        </div>
        
        <h1 class="animate-item" data-en="Login" data-sk="Prihlásenie">Login</h1>
        
        <div class="social-login animate-item">
            <button class="google-btn" onclick="handleGoogleLogin()">
                <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
                <span data-en="Continue with Google" data-sk="Pokračovať s Google">Continue with Google</span>
            </button>
        </div>

        <div class="divider animate-item">
            <span data-en="Or sign in with email" data-sk="Alebo sa prihláste emailom">Or sign in with email</span>
        </div>
        
        <form id="loginForm" class="animate-item">
            <div class="form-group">
                <label for="email" data-en="Email" data-sk="Email">Email</label>
                <input type="email" id="email" name="email" required 
                       data-en-placeholder="name@example.com" 
                       data-sk-placeholder="meno@priklad.sk">
            </div>
            <div class="form-group">
                <label for="password" data-en="Password" data-sk="Heslo">Password</label>
                <input type="password" id="password" name="password" required 
                       data-en-placeholder="••••••••" 
                       data-sk-placeholder="••••••••">
            </div>
            <button type="submit" data-en="Login" data-sk="Prihlásiť sa">Login</button>
        </form>

        <div id="message"></div>
        
        <div class="register-link animate-item">
            <span data-en="Don't have an account?" data-sk="Nemáte účet?">Don't have an account?</span> 
            <a href="/register" data-en="Register now" data-sk="Zaregistrujte sa">Register now</a>
        </div>
        
                <div class="register-link animate-item">
            <!-- <span data-en="Don't have an account?" data-sk="Nemáte účet?">Don't have an account?</span>  -->
            <a href="/forgot-password" data-en="Forgot password" data-sk="Zabudli ste heslo?">Forgot password</a>
        </div>


        <div class="home-button animate-item">
            <a href="/" data-en="← Back to Homepage" data-sk="← Späť na domovskú stránku">← Back to Homepage</a>
        </div>
    </div>

    <script>
        // 1. Common Animations & Background (Shared logic)
        document.addEventListener('DOMContentLoaded', function() {
            // --- Kaskádový efekt (Staggered animation) ---
            const animatedItems = document.querySelectorAll('.animate-item');
            animatedItems.forEach((item, index) => {
                setTimeout(() => {
                    item.classList.add('visible');
                }, 200 + (index * 100));
            });

            // --- 3D Tilt Efekt ---
            const card = document.getElementById('card');
            const container = document.body;

            if (window.matchMedia("(hover: hover)").matches) {
                container.addEventListener('mousemove', (e) => {
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });

                container.addEventListener('mouseleave', () => {
                    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                    card.style.transition = "transform 0.5s ease";
                });
                
                container.addEventListener('mouseenter', () => {
                    card.style.transition = "none";
                });
            }

            // --- Dynamické pozadie (Písmenká) ---
            const bgContainer = document.getElementById('bgShapes');
            const characters = ['A', 'B', 'C', '?', '!', '1', '2', '3', '@', '&'];
            
            function createShape() {
                const shape = document.createElement('div');
                shape.classList.add('shape');
                shape.innerText = characters[Math.floor(Math.random() * characters.length)];
                const size = Math.random() * 30 + 10;
                shape.style.fontSize = `${size}px`;
                shape.style.left = `${Math.random() * 100}vw`;
                const duration = Math.random() * 10 + 10;
                shape.style.animationDuration = `${duration}s`;
                bgContainer.appendChild(shape);
                setTimeout(() => shape.remove(), duration * 1000);
            }

            for(let i=0; i<15; i++) setTimeout(createShape, i * 500);
            setInterval(createShape, 1000);

            // 2. Existing Logic (Language & Login)
            
            const langButtons = document.querySelectorAll('.lang-btn');
            const currentLang = localStorage.getItem('preferredLang') || 'en';
            setActiveLanguage(currentLang);
            
            langButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    setActiveLanguage(lang);
                    localStorage.setItem('preferredLang', lang);
                });
            });
            
            function setActiveLanguage(lang) {
                langButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
                });
                
                document.querySelectorAll('[data-en], [data-sk]').forEach(element => {
                    if (element.hasAttribute(`data-${lang}`)) {
                        const text = element.getAttribute(`data-${lang}`);
                        if (element.tagName === 'TITLE') document.title = text;
                        else element.textContent = text;
                    }
                });

                document.querySelectorAll('[data-en-placeholder], [data-sk-placeholder]').forEach(element => {
                    if (element.hasAttribute(`data-${lang}-placeholder`)) {
                        element.placeholder = element.getAttribute(`data-${lang}-placeholder`);
                    }
                });
            }

            // Login Handler
            const form = document.getElementById('loginForm');
            
            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                const email = form.email.value;
                const password = form.password.value;
                const currentLang = localStorage.getItem('preferredLang') || 'en';

                const submitButton = form.querySelector('button[type="submit"]');
                const originalBtnText = submitButton.textContent;
                submitButton.disabled = true;
                submitButton.textContent = currentLang === 'sk' ? 'Spracovávam...' : 'Processing...';

                // Validation
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showMessage(currentLang === 'sk' ? 'Neplatný email.' : 'Invalid email.', 'error');
                    submitButton.disabled = false;
                    submitButton.textContent = originalBtnText;
                    return;
                }

                try {
                    // API call
                    const response = await fetch(`/api/v1/login?lang=${currentLang}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showMessage(currentLang === 'sk' ? 'Prihlásenie úspešné!' : 'Login successful!', 'success');
                        
                        // --- KĽÚČOVÁ OPRAVA: ULOŽENIE TOKENU ---
                        if (data.access_token) {
                            localStorage.setItem('access_token', data.access_token);
                        }
                        // ----------------------------------------

                        if (data.user) {
                            localStorage.setItem('user_email', data.user.email);
                            localStorage.setItem('user_name', data.user.name || '');
                            localStorage.setItem('user_id', data.user.id);
                        }

                        // Presmerovanie po krátkej pauze
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 1000);
                        
                    } else {
                        throw new Error(data.detail || 'Login failed');
                    }
                } catch (error) {
                    console.error(error);
                    showMessage(
                        currentLang === 'sk' ? 'Chyba prihlásenia' : 'Login failed', 
                        'error'
                    );
                    form.password.value = '';
                    submitButton.disabled = false;
                    submitButton.textContent = originalBtnText;
                }
            });
        });

        function handleGoogleLogin() {
            window.location.href = '/auth/google';
        }

        function checkOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');
            const currentLang = localStorage.getItem('preferredLang') || 'en';

            if (error) {
                showMessage(error, 'error');
            } else if (token) {
                localStorage.setItem('access_token', token);
                showMessage(currentLang === 'sk' ? 'Google prihlásenie úspešné' : 'Google login successful', 'success');
                setTimeout(() => window.location.href = '/dashboard', 1000);
            }
        }

        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
        }

        checkOAuthCallback();
    </script>
</body>
</html>
