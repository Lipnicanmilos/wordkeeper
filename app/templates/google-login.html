<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login</title>
    <style>
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 24px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
            margin: 10px 0;
        }
        
        .google-btn:hover {
            background: #f5f5f5;
            border-color: #ccc;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .google-btn img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <button class="google-btn" onclick="handleGoogleLogin()">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
        <span data-en="Continue with Google" data-sk="Pokračovať s Google">Continue with Google</span>
    </button>

    <script>
        function handleGoogleLogin() {
            // Presmerujeme na backend Google OAuth endpoint
            window.location.href = '/auth/google';
        }
        
        // Spracovanie callbacku po návrate z Google
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newUser = urlParams.get('new_user');
            
            if (token) {
                // Uložíme token a presmerujeme na dashboard
                localStorage.setItem('access_token', token);
                
                // Ak je to nový používateľ, môžeme zobraziť welcome message
                if (newUser === '1') {
                    localStorage.setItem('show_welcome', 'true');
                }
                
                // Načítame user data
                loadUserDataAndRedirect();
            }
        });
        
        async function loadUserDataAndRedirect() {
            try {
                const token = localStorage.getItem('access_token');
                const response = await fetch('/api/v1/users/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const userData = await response.json();
                    localStorage.setItem('user_email', userData.email);
                    localStorage.setItem('user_name', userData.name);
                    
                    // Presmerujeme na dashboard
                    window.location.href = '/dashboard';
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
    </script>
</body>
</html>
