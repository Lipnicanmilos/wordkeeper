<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Sign up – LexiNova" data-sk="Registrácia – LexiNova">Sign up – LexiNova</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4079ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="LexiNova">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #4079ff;
            --accent:  #40ffaa;
            --grad:    linear-gradient(135deg, #4079ff, #40ffaa);
            --bg:      #f4f7fe;
            --surface: #ffffff;
            --text:    #1a202c;
            --muted:   #718096;
            --border:  #e2e8f0;
            --shadow:  0 8px 32px rgba(64,121,255,.09);
            --r:       16px;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── BACKGROUND ─── */
        .bg-shapes { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .shape {
            position: absolute; color: var(--primary); opacity: .06;
            font-weight: 700; user-select: none;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
            10%  { opacity: .35; }
            90%  { opacity: .35; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* ─── HEADER ─── */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(244,247,254,.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1100px; margin: 0 auto;
            padding: 0 1.5rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            font-size: 1.25rem; font-weight: 800; letter-spacing: -.03em;
            background: var(--grad); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
            text-decoration: none;
        }
        .header-nav { display: flex; align-items: center; gap: .4rem; }
        .lang-switch { display: flex; gap: 3px; margin-right: .4rem; }
        .lang-btn {
            padding: .28rem .65rem; border: 1px solid var(--border);
            background: var(--surface); border-radius: 7px; font-size: .78rem;
            font-weight: 700; cursor: pointer; color: var(--muted); transition: all .2s;
        }
        .lang-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .nav-link {
            padding: .45rem .8rem; color: var(--muted); text-decoration: none;
            font-weight: 500; font-size: .88rem; border-radius: 9px; transition: color .2s;
        }
        .nav-link:hover { color: var(--text); }
        .btn-nav {
            padding: .48rem 1.1rem; background: var(--primary); color: #fff;
            border-radius: 10px; font-weight: 700; font-size: .88rem;
            text-decoration: none; transition: all .2s;
        }
        .btn-nav:hover { background: #2563eb; transform: translateY(-1px); }

        /* Mobile hamburger */
        .menu-toggle {
            display: none; border: none; background: none;
            font-size: 1.5rem; cursor: pointer; padding: .3rem; color: var(--text);
        }
        .mobile-nav {
            display: none; flex-direction: column;
            padding: .75rem 1.5rem 1rem; gap: 0;
            border-top: 1px solid var(--border);
            background: rgba(244,247,254,.97);
        }
        .mobile-nav.open { display: flex; }
        .mobile-nav a {
            padding: .75rem 0; color: var(--text); text-decoration: none;
            font-weight: 500; border-bottom: 1px solid var(--border); font-size: .95rem;
        }
        .mobile-nav a:last-child { border-bottom: none; color: var(--primary); font-weight: 700; }
        .mobile-lang { display: flex; gap: .5rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }

        /* ─── MAIN ─── */
        .auth-main {
            min-height: calc(100vh - 64px);
            display: flex; align-items: center; justify-content: center;
            padding: 2.5rem 1.25rem;
        }

        /* ─── CARD ─── */
        .auth-card {
            width: 100%; max-width: 440px;
            background: var(--surface);
            border-radius: 20px;
            padding: 2.5rem 2.25rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: cardPop .7s cubic-bezier(.2,.8,.2,1) both;
        }
        @keyframes cardPop {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg,#eef2ff,#f0fff8);
            border: 1px solid #c7d8ff; border-radius: 50px;
            padding: .3rem .9rem; font-size: .78rem; font-weight: 700;
            color: var(--primary); margin-bottom: 1.25rem;
        }
        .auth-card h1 {
            font-size: 1.75rem; font-weight: 800; letter-spacing: -.03em;
            margin-bottom: .35rem;
        }
        .auth-subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 1.75rem; }

        /* Google button */
        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 11px;
            width: 100%; padding: .85rem;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 50px; font-size: .95rem; font-weight: 600; color: var(--text);
            cursor: pointer; transition: all .25s; margin-bottom: 1.5rem;
        }
        .google-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(64,121,255,.12); }
        .google-btn img { width: 20px; height: 20px; }

        /* Divider */
        .divider {
            position: relative; text-align: center;
            color: var(--muted); font-size: .82rem; margin-bottom: 1.5rem;
        }
        .divider::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0;
            height: 1px; background: var(--border); z-index: 0;
        }
        .divider span {
            background: var(--surface); padding: 0 .85rem;
            position: relative; z-index: 1;
        }

        /* Form */
        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: block; font-size: .83rem; font-weight: 600;
            color: var(--text); margin-bottom: .4rem;
        }
        .form-input {
            width: 100%; padding: .85rem 1rem;
            border: 1.5px solid var(--border); background: var(--bg);
            border-radius: 12px; font-size: 1rem; font-family: inherit;
            color: var(--text); transition: all .25s;
        }
        .form-input:focus {
            outline: none; border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(64,121,255,.1);
        }
        .form-input::placeholder { color: #b0bec5; }
        .form-input.valid   { border-color: #5cb85c; }
        .form-input.invalid { border-color: #e53e3e; }

        /* Password requirements */
        .password-requirements {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; padding: .85rem 1rem; margin-top: .6rem;
            font-size: .82rem; display: none;
        }
        .password-requirements.visible { display: block; }
        .requirement {
            display: flex; align-items: center; gap: 7px;
            padding: .2rem 0; color: var(--muted); transition: color .2s;
        }
        .requirement.met   { color: #5cb85c; }
        .requirement.unmet { color: #e53e3e; }
        .req-icon { font-size: 1rem; width: 16px; text-align: center; }

        /* Submit */
        .btn-submit {
            width: 100%; padding: .92rem;
            background: var(--grad); color: #fff;
            border: none; border-radius: 50px;
            font-size: 1rem; font-weight: 700; font-family: inherit;
            cursor: pointer; transition: all .25s; margin-top: .25rem;
            box-shadow: 0 4px 14px rgba(64,121,255,.35);
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(64,121,255,.45); }
        .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }

        /* Message */
        #message {
            display: none; padding: .85rem 1rem; border-radius: 12px;
            font-weight: 500; font-size: .88rem; margin-top: 1rem;
            animation: slideDown .3s ease;
        }
        @keyframes slideDown { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .success { color: #155724; background: #d4edda; border: 1px solid #c3e6cb; display: block !important; }
        .error   { color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb; display: block !important; }

        /* Footer links inside card */
        .auth-links { text-align: center; margin-top: 1.5rem; font-size: .88rem; color: var(--muted); }
        .auth-links a { color: var(--primary); font-weight: 600; text-decoration: none; transition: color .2s; }
        .auth-links a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 640px) {
            .header-nav { display: none; }
            .menu-toggle { display: block; }
            .auth-card { padding: 2rem 1.5rem; }
            .auth-main { padding: 1.5rem 1rem; align-items: flex-start; padding-top: 2rem; }
        }
    </style>
</head>
<body>

<div class="bg-shapes" id="bgShapes"></div>

<!-- ── HEADER ── -->
<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">⚡ LexiNova</a>
        <nav class="header-nav">
            <div class="lang-switch">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="sk">SK</button>
            </div>
            <a href="/" class="nav-link" data-en="← Home" data-sk="← Domov">← Home</a>
            <a href="/login" class="btn-nav" data-en="Log in" data-sk="Prihlásiť sa">Log in</a>
        </nav>
        <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
    </div>
    <nav class="mobile-nav" id="mobileNav">
        <div class="mobile-lang">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sk">SK</button>
        </div>
        <a href="/"      data-en="← Home"    data-sk="← Domov">← Home</a>
        <a href="/login" data-en="Log in"    data-sk="Prihlásiť sa">Log in</a>
    </nav>
</header>

<!-- ── MAIN ── -->
<main class="auth-main">
    <div class="auth-card">

        <div class="auth-badge">🚀 <span data-en="Free forever" data-sk="Zadarmo navždy">Free forever</span></div>

        <h1 data-en="Create account" data-sk="Vytvoriť účet">Create account</h1>
        <p class="auth-subtitle"
           data-en="Start learning vocabulary smarter, for free."
           data-sk="Začnite sa učiť slovíčka inteligentnejšie, zadarmo.">
            Start learning vocabulary smarter, for free.
        </p>

        <!-- Google -->
        <button class="google-btn" onclick="handleGoogleRegister()">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
            <span data-en="Sign up with Google" data-sk="Registrovať sa cez Google">Sign up with Google</span>
        </button>

        <div class="divider">
            <span data-en="or register with email" data-sk="alebo emailom">or register with email</span>
        </div>

        <!-- Form -->
        <form id="registerForm">
            <div class="form-group">
                <label class="form-label" for="email" data-en="Email" data-sk="Email">Email</label>
                <input class="form-input" type="email" id="email" name="email" required
                       data-en-placeholder="name@example.com"
                       data-sk-placeholder="meno@priklad.sk"
                       placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label class="form-label" for="password" data-en="Password" data-sk="Heslo">Password</label>
                <input class="form-input" type="password" id="password" name="password" required
                       data-en-placeholder="At least 8 characters"
                       data-sk-placeholder="Aspoň 8 znakov"
                       placeholder="At least 8 characters">
                <div class="password-requirements" id="passwordReqs">
                    <div class="requirement" id="req-length">
                        <span class="req-icon">○</span>
                        <span data-en="At least 8 characters" data-sk="Aspoň 8 znakov">At least 8 characters</span>
                    </div>
                    <div class="requirement" id="req-upper">
                        <span class="req-icon">○</span>
                        <span data-en="Uppercase letter (A–Z)" data-sk="Veľké písmeno (A–Z)">Uppercase letter (A–Z)</span>
                    </div>
                    <div class="requirement" id="req-lower">
                        <span class="req-icon">○</span>
                        <span data-en="Lowercase letter (a–z)" data-sk="Malé písmeno (a–z)">Lowercase letter (a–z)</span>
                    </div>
                    <div class="requirement" id="req-number">
                        <span class="req-icon">○</span>
                        <span data-en="At least one number (0–9)" data-sk="Aspoň jedna číslica (0–9)">At least one number (0–9)</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword"
                       data-en="Confirm password" data-sk="Zopakujte heslo">Confirm password</label>
                <input class="form-input" type="password" id="confirmPassword" name="confirmPassword" required
                       data-en-placeholder="Repeat your password"
                       data-sk-placeholder="Zopakujte heslo"
                       placeholder="Repeat your password">
            </div>

            <button class="btn-submit" type="submit" id="submitBtn"
                    data-en="Create account" data-sk="Vytvoriť účet">Create account</button>
        </form>

        <div id="message"></div>

        <div class="auth-links">
            <span data-en="Already have an account?" data-sk="Máte už účet?">Already have an account?</span>
            <a href="/login" data-en=" Log in" data-sk=" Prihlásiť sa"> Log in</a>
        </div>

    </div>
</main>

<script>
    /* ── LANG ── */
    let currentLang = localStorage.getItem('preferredLang') || 'en';

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('preferredLang', lang);
        document.querySelectorAll('[data-en],[data-sk]').forEach(el => {
            const text = el.getAttribute('data-' + lang);
            if (!text) return;
            if (el.tagName === 'TITLE') document.title = text;
            else el.textContent = text;
        });
        document.querySelectorAll('[data-en-placeholder]').forEach(el => {
            el.placeholder = el.getAttribute('data-' + lang + '-placeholder') || '';
        });
        document.querySelectorAll('.lang-btn').forEach(b =>
            b.classList.toggle('active', b.getAttribute('data-lang') === lang));
    }

    document.querySelectorAll('.lang-btn').forEach(b =>
        b.addEventListener('click', () => setLang(b.getAttribute('data-lang'))));

    /* ── MOBILE MENU ── */
    const menuToggle = document.getElementById('menuToggle');
    const mobileNav  = document.getElementById('mobileNav');
    menuToggle.addEventListener('click', () => {
        mobileNav.classList.toggle('open');
        menuToggle.textContent = mobileNav.classList.contains('open') ? '✕' : '☰';
    });
    mobileNav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        mobileNav.classList.remove('open'); menuToggle.textContent = '☰';
    }));

    /* ── PASSWORD VALIDATION ── */
    const passwordInput = document.getElementById('password');
    const confirmInput  = document.getElementById('confirmPassword');
    const reqBox        = document.getElementById('passwordReqs');

    const REQS = {
        length: { el: document.getElementById('req-length'), test: p => p.length >= 8 },
        upper:  { el: document.getElementById('req-upper'),  test: p => /[A-Z]/.test(p) },
        lower:  { el: document.getElementById('req-lower'),  test: p => /[a-z]/.test(p) },
        number: { el: document.getElementById('req-number'), test: p => /[0-9]/.test(p) },
    };

    function validatePassword() {
        const p = passwordInput.value;
        let allMet = true;
        for (const [, r] of Object.entries(REQS)) {
            const ok = r.test(p);
            r.el.className = 'requirement ' + (ok ? 'met' : 'unmet');
            r.el.querySelector('.req-icon').textContent = ok ? '✓' : '○';
            if (!ok) allMet = false;
        }
        passwordInput.classList.toggle('valid',   allMet);
        passwordInput.classList.toggle('invalid', !allMet && p.length > 0);
        return allMet;
    }

    function validateConfirm() {
        const match = confirmInput.value === passwordInput.value && confirmInput.value.length > 0;
        confirmInput.classList.toggle('valid',   match);
        confirmInput.classList.toggle('invalid', !match && confirmInput.value.length > 0);
        return match;
    }

    passwordInput.addEventListener('focus', () => reqBox.classList.add('visible'));
    passwordInput.addEventListener('blur',  () => { if (!passwordInput.value) reqBox.classList.remove('visible'); });
    passwordInput.addEventListener('input', validatePassword);
    confirmInput.addEventListener('input',  validateConfirm);

    /* ── FORM SUBMIT ── */
    document.getElementById('registerForm').addEventListener('submit', async e => {
        e.preventDefault();
        const email    = e.target.email.value;
        const password = passwordInput.value;
        const confirm  = confirmInput.value;
        const btn      = document.getElementById('submitBtn');
        const origText = btn.textContent;

        if (!validatePassword()) {
            showMsg(currentLang === 'sk' ? 'Heslo nespĺňa požiadavky.' : 'Password does not meet requirements.', 'error');
            return;
        }
        if (password !== confirm) {
            showMsg(currentLang === 'sk' ? 'Heslá sa nezhodujú.' : 'Passwords do not match.', 'error');
            return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showMsg(currentLang === 'sk' ? 'Neplatný email.' : 'Invalid email.', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = currentLang === 'sk' ? 'Registrujem…' : 'Creating account…';

        try {
            const res  = await fetch('/api/v1/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (res.ok) {
                showMsg(
                    currentLang === 'sk'
                        ? 'Účet vytvorený! Presmerovanie…'
                        : 'Account created! Redirecting…',
                    'success'
                );
                setTimeout(() => { window.location.href = '/dashboard'; }, 1200);
            } else {
                showMsg(data.detail || (currentLang === 'sk' ? 'Registrácia zlyhala.' : 'Registration failed.'), 'error');
                btn.disabled = false;
                btn.textContent = origText;
            }
        } catch {
            showMsg(currentLang === 'sk' ? 'Chyba spojenia.' : 'Connection error.', 'error');
            btn.disabled = false;
            btn.textContent = origText;
        }
    });

    /* ── GOOGLE ── */
    function handleGoogleRegister() { window.location.href = '/auth/google'; }

    /* ── MESSAGE ── */
    function showMsg(msg, type) {
        const el = document.getElementById('message');
        el.textContent = msg;
        el.className = type;
        setTimeout(() => { el.style.display = 'none'; el.className = ''; }, 6000);
    }

    /* ── BACKGROUND ── */
    (function() {
        const bg = document.getElementById('bgShapes');
        const chars = ['A','B','C','?','!','Ω','文','①','λ'];
        function make() {
            const el = document.createElement('div');
            el.className = 'shape';
            el.textContent = chars[Math.floor(Math.random() * chars.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 22 + 10) + 'px';
            el.style.animationDuration = (Math.random() * 10 + 10) + 's';
            bg.appendChild(el);
            setTimeout(() => el.remove(), 20000);
        }
        for (let i = 0; i < 12; i++) setTimeout(make, i * 500);
        setInterval(make, 2000);
    })();

    /* ── INIT ── */
    setLang(currentLang);
</script>
<script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
