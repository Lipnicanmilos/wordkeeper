<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Repeat Vocabulary – LexiNova" data-sk="Opakovanie – LexiNova">Repeat Vocabulary – LexiNova</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4079ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="LexiNova">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script>(function(){if(localStorage.getItem('darkMode')==='true')document.documentElement.setAttribute('data-theme','dark');})()</script>
    <link rel="stylesheet" href="/static/css/fonts.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #4079ff;
            --accent:  #40ffaa;
            --grad:    linear-gradient(135deg, #4079ff, #40ffaa);
            --bg:      #f4f7fe;
            --surface: #ffffff;
            --text:    #1a202c;
            --muted:   #718096;
            --border:  #e2e8f0;
            --shadow:  0 8px 32px rgba(64,121,255,.09);
            --danger:  #e53e3e;
            --r:       16px;
        }
        [data-theme="dark"] {
            --bg:      #0f172a;
            --surface: rgba(30,41,59,.97);
            --text:    #f1f5f9;
            --muted:   #94a3b8;
            --border:  #334155;
            --shadow:  0 8px 32px rgba(0,0,0,.3);
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden;
            transition: background-color .3s, color .3s;
        }

        /* ─── BACKGROUND ─── */
        .bg-shapes { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .shape { position: absolute; color: var(--primary); opacity: .07; font-weight: 700; animation: floatUp linear infinite; }
        @keyframes floatUp {
            0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10%  { opacity: .25; }
            90%  { opacity: .25; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* ─── HEADER ─── */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(244,247,254,.92); backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }
        [data-theme="dark"] .header { background: rgba(15,23,42,.92); }
        .header-inner {
            max-width: 1000px; margin: 0 auto; padding: 0 1.5rem;
            height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 1rem;
        }
        .logo {
            font-size: 1.25rem; font-weight: 800; letter-spacing: -.03em;
            background: var(--grad); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none;
        }
        .header-right { display: flex; align-items: center; gap: .4rem; }
        .lang-switch { display: flex; gap: 3px; }
        .lang-btn {
            padding: .28rem .65rem; border: 1px solid var(--border);
            background: var(--surface); border-radius: 7px; font-size: .78rem;
            font-weight: 700; cursor: pointer; color: var(--muted); transition: all .2s; font-family: inherit;
        }
        .lang-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .icon-btn {
            display: flex; align-items: center; gap: 6px;
            padding: .45rem .8rem; border-radius: 10px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text);
            font-size: .84rem; font-weight: 600; cursor: pointer; transition: all .2s;
            text-decoration: none; white-space: nowrap; font-family: inherit;
        }
        .icon-btn:hover { border-color: var(--primary); color: var(--primary); }
        .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
        .menu-toggle {
            display: none; border: none; background: none;
            font-size: 1.4rem; cursor: pointer; color: var(--text); padding: .3rem;
        }
        .mobile-nav {
            display: none; flex-direction: column;
            padding: .75rem 1.5rem 1rem; border-top: 1px solid var(--border);
            background: rgba(244,247,254,.97);
        }
        [data-theme="dark"] .mobile-nav { background: rgba(15,23,42,.97); }
        .mobile-nav.open { display: flex; }
        .mobile-nav a, .mobile-nav button {
            padding: .75rem 0; color: var(--text); text-decoration: none; font-weight: 500;
            border-bottom: 1px solid var(--border); font-size: .95rem;
            background: none; border-left: none; border-right: none; border-top: none;
            text-align: left; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 8px;
        }
        .mobile-nav > *:last-child { border-bottom: none; }
        .mobile-lang { display: flex; gap: .5rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }

        /* ─── MAIN CARD ─── */
        .repeat-container {
            max-width: 780px; margin: 2.5rem auto; padding: 2.5rem;
            background: var(--surface); border-radius: 24px;
            box-shadow: var(--shadow); border: 1.5px solid var(--border);
            animation: cardPop .7s cubic-bezier(.2,.8,.2,1) both;
        }
        @keyframes cardPop { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        /* ─── CARD HEADER ─── */
        .card-header { text-align: center; margin-bottom: 2rem; }
        .card-header h1 {
            font-size: 2rem; font-weight: 800; letter-spacing: -.03em;
            background: var(--grad); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: .4rem;
        }
        .card-subtitle { color: var(--muted); font-size: .95rem; }

        /* ─── LANGUAGE SELECTOR ─── */
        .lang-selector {
            display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
            margin-bottom: 1.5rem; font-size: .88rem;
        }
        .lang-selector label { color: var(--muted); font-weight: 600; margin-right: .4rem; }
        .lang-selector select {
            padding: .4rem .8rem; border: 1.5px solid var(--border);
            border-radius: 10px; background: var(--bg); color: var(--text);
            font-family: inherit; font-size: .88rem; cursor: pointer;
        }
        .lang-selector select:focus { outline: none; border-color: var(--primary); }

        /* ─── PROGRESS ─── */
        .progress { margin: 1.5rem 0; }
        .progress-bar {
            width: 100%; height: 8px; background: var(--bg);
            border-radius: 4px; overflow: hidden; margin-bottom: .5rem;
        }
        .progress-fill { height: 100%; background: var(--grad); width: 0%; transition: width .3s; border-radius: 4px; }
        .progress-text { font-size: .85rem; color: var(--muted); text-align: center; }

        /* ─── FLASHCARD ─── */
        .flashcard {
            background: var(--bg); border-radius: 20px; padding: 2rem;
            margin: 1.5rem 0; min-height: 240px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all .25s;
            border: 1.5px solid var(--border); text-align: center;
        }
        .flashcard:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(64,121,255,.1); border-color: var(--primary); }
        .flashcard.flipped { background: var(--surface); border-color: var(--primary); border-width: 2px; }
        .card-content { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: .75rem; }
        .card-label {
            font-size: .78rem; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* ─── CONTROLS ─── */
        .controls { display: flex; justify-content: center; gap: .75rem; margin: 1.25rem 0; flex-wrap: wrap; }
        .btn {
            padding: .85rem 1.8rem; border: none; border-radius: 50px;
            font-size: .95rem; font-weight: 700; cursor: pointer;
            transition: all .25s; font-family: inherit;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-grad { background: var(--grad); color: #fff; box-shadow: 0 4px 14px rgba(64,121,255,.35); }
        .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
        .btn-play { background: linear-gradient(135deg, #FF6B35, #F7931E); color: #fff; box-shadow: 0 4px 14px rgba(255,107,53,.3); }
        .btn-stop { background: linear-gradient(135deg, #667,#999); color: #fff; }

        /* ─── LOADING ─── */
        .loading { text-align: center; padding: 3rem; color: var(--muted); }
        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── MESSAGE ─── */
        .msg {
            padding: .9rem 1rem; border-radius: 12px; font-weight: 600;
            text-align: center; display: none; margin: 1rem 0; font-size: .9rem;
        }
        .msg.success { background: #d4edda; color: #155724; display: block; }
        .msg.error   { background: #f8d7da; color: #721c24; display: block; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            .header-right { display: none; }
            .menu-toggle  { display: block; }
            .repeat-container { margin: 1rem; padding: 1.5rem; }
            .card-header h1 { font-size: 1.5rem; }
            .card-content { font-size: 1.4rem; }
            .controls { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 240px; }
            .lang-selector { flex-direction: column; align-items: center; gap: .75rem; }
        }
    </style>
</head>
<body>

<div class="bg-shapes" id="bgShapes"></div>

<!-- ── HEADER ── -->
<header class="header">
    <div class="header-inner">
        <a href="/dashboard" class="logo">⚡ LexiNova</a>
        <div class="header-right">
            <div class="lang-switch">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="sk">SK</button>
            </div>
            <button id="installBtn" class="icon-btn" style="display:none; color:var(--primary);">
                📲 <span data-en="Install" data-sk="Inštalovať">Install</span>
            </button>
            <button onclick="history.back()" class="icon-btn">
                ← <span data-en="Back" data-sk="Späť">Back</span>
            </button>
            <button onclick="logout()" class="icon-btn danger">
                <span data-en="Log out" data-sk="Odhlásiť sa">Log out</span>
            </button>
        </div>
        <button class="menu-toggle" id="menuToggle">☰</button>
    </div>
    <nav class="mobile-nav" id="mobileNav">
        <div class="mobile-lang">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sk">SK</button>
        </div>
        <button onclick="history.back()">← <span data-en="Back" data-sk="Späť">Back</span></button>
        <button onclick="logout()" style="color:var(--danger)"><span data-en="Log out" data-sk="Odhlásiť sa">Log out</span></button>
    </nav>
</header>

<!-- ── MAIN ── -->
<main style="padding: 0 1rem 3rem;">
    <div class="repeat-container">

        <div class="card-header">
            <h1 data-en="Repeat Vocabulary" data-sk="Opakovanie slovíčok">Repeat Vocabulary</h1>
            <div class="card-subtitle" id="categoryInfo" data-en="Loading…" data-sk="Načítavam…">Loading…</div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div data-en="Loading words…" data-sk="Načítavam slovíčka…">Loading words…</div>
        </div>

        <div id="content" style="display:none;">
            <div class="lang-selector">
                <div>
                    <label for="originalLangSelect">Original:</label>
                    <select id="originalLangSelect">
                        <option value="en-US">English</option>
                        <option value="sk-SK">Slovenčina</option>
                        <option value="de-DE">Deutsch</option>
                        <option value="fr-FR">Français</option>
                        <option value="es-ES">Español</option>
                    </select>
                </div>
                <div>
                    <label for="translationLangSelect">Translation:</label>
                    <select id="translationLangSelect">
                        <option value="sk-SK">Slovenčina</option>
                        <option value="en-US">English</option>
                        <option value="de-DE">Deutsch</option>
                        <option value="fr-FR">Français</option>
                        <option value="es-ES">Español</option>
                    </select>
                </div>
            </div>

            <div class="progress">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">0 / 0</div>
            </div>

            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="card-content" id="cardContent" data-en="Click to start" data-sk="Klikni pre začatie">Click to start</div>
                <div class="card-label"  id="cardLabel"   data-en="Word"           data-sk="Slovíčko">Word</div>
            </div>

            <div class="controls">
                <button class="btn btn-play"  id="autoPlayBtn" onclick="startAutoPlay()" data-en="▶ Auto Play" data-sk="▶ Automaticky">▶ Auto Play</button>
                <button class="btn btn-stop"  id="stopBtn"     onclick="stopAutoPlay()"  style="display:none;" data-en="⏹ Stop" data-sk="⏹ Zastaviť">⏹ Stop</button>
            </div>
            <div class="controls">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousWord()" data-en="← Previous" data-sk="← Predchádzajúce">← Previous</button>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextWord()"     data-en="Next →"     data-sk="Ďalšie →">Next →</button>
            </div>
        </div>

        <div id="message" class="msg"></div>

        <div class="controls" style="margin-top:1.5rem;">
            <button class="btn btn-secondary" onclick="history.back()" data-en="← Back" data-sk="← Späť">← Back</button>
        </div>
    </div>
</main>

<script src="/static/js/offline-cache.js"></script>
<script>
    let words = [], currentIndex = 0, isFlipped = false;
    let categoryId = null, level = null, currentUserId = null;
    let speechSynth = window.speechSynthesis;
    let isAutoPlaying = false, shuffledIndices = [], autoPlayIndex = 0;
    let originalLanguage = 'en-US', translationLanguage = 'sk-SK';

    document.addEventListener('DOMContentLoaded', () => {
        initBackground();
        initOfflineUI();

        const params = new URLSearchParams(window.location.search);
        categoryId = params.get('category');
        level      = params.get('level');  // null = všetky levely ("Všetky slová")

        if (!categoryId) { showMessage('Invalid parameters', 'error'); document.getElementById('loading').style.display = 'none'; return; }

        document.getElementById('originalLangSelect').addEventListener('change',    e => originalLanguage    = e.target.value);
        document.getElementById('translationLangSelect').addEventListener('change', e => translationLanguage = e.target.value);

        const savedLang = localStorage.getItem('preferredLang') || 'en';
        setLang(savedLang);
        document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => {
            setLang(b.dataset.lang); localStorage.setItem('preferredLang', b.dataset.lang);
        }));

        loadUserData();

        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            if (e.key === 'ArrowRight') nextWord();
            else if (e.key === 'ArrowLeft') previousWord();
            else if ((e.key === 'ArrowUp' || e.key === ' ') && !isFlipped) { e.preventDefault(); flipCard(); }
            else if (e.key === 'ArrowDown' && isFlipped) { e.preventDefault(); flipCard(); }
        });
    });

    /* ── MOBILE MENU ── */
    const menuToggle = document.getElementById('menuToggle');
    const mobileNav  = document.getElementById('mobileNav');
    menuToggle.addEventListener('click', () => {
        mobileNav.classList.toggle('open');
        menuToggle.textContent = mobileNav.classList.contains('open') ? '✕' : '☰';
    });

    /* ── BACKGROUND ── */
    function initBackground() {
        const bg = document.getElementById('bgShapes');
        const chars = ['A','B','C','?','!','Ω','文','λ'];
        function make() {
            const el = document.createElement('div'); el.className = 'shape';
            el.textContent = chars[Math.floor(Math.random() * chars.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 22 + 10) + 'px';
            el.style.animationDuration = (Math.random() * 10 + 10) + 's';
            bg.appendChild(el); setTimeout(() => el.remove(), 18000);
        }
        for (let i = 0; i < 10; i++) setTimeout(make, i * 400);
        setInterval(make, 1800);
    }

    /* ── LANG ── */
    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        document.querySelectorAll('[data-en],[data-sk]').forEach(el => { const t = el.getAttribute(`data-${lang}`); if(t) el.textContent = t; });
    }

    /* ── OFFLINE ── */
    function initOfflineUI() {
        if (!navigator.onLine) showMessage(currentLang==='sk'?'Offline: zobrazenie z cache.':'Offline: showing cached data.','error');
        window.addEventListener('online',  () => showMessage('Online: data will update.','success'));
        window.addEventListener('offline', () => showMessage('Offline: showing cached data.','error'));
    }

    /* ── USER + WORDS ── */
    async function loadUserData() {
        try {
            const res  = await fetch('/api/user', { credentials:'same-origin' });
            const user = await res.json().catch(() => null);
            const offline = !navigator.onLine || (user && (user.error==='offline' || user.offline===true));
            if (!res.ok || !user || offline) {
                currentUserId = parseInt(localStorage.getItem('wk_user_id')||'0')||null;
                await loadWords(); return;
            }
            currentUserId = user.id;
            if (user.dark_mode) { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('darkMode','true'); }
            else { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('darkMode','false'); }
            await loadCategoryInfo();
            await loadWords();
        } catch {
            currentUserId = parseInt(localStorage.getItem('wk_user_id')||'0')||null;
            try { await loadWords(); } catch {}
        }
    }

    async function loadCategoryInfo() {
        try {
            const res = await fetch(`/api/v1/categories/${categoryId}`, { credentials:'same-origin' });
            if (!res.ok) return;
            const cat = await res.json();
            const levelLabels = { dont_know:"Don't Know", learning:'Learning', know:'Know' };
            const label = level ? (levelLabels[level] || level) : 'All words';
            const pct   = level ? (cat.level_percentages[level] || 0) : (cat.total_percentage ?? '');
            document.getElementById('categoryInfo').textContent =
                pct === '' ? `${cat.name} – ${label}` : `${cat.name} – ${label} (${pct}%)`;
        } catch {}
    }

    const { offlineWordsCacheKey, loadOfflineWordsFromCache, saveOfflineWordsToCache, prefetchCategoryLevel } = window.WKOfflineCache;

    async function loadWords() {
        const testDirection = 'original_to_translation';
        // level === null → "Všetky slová": pošli všetky levely a zlúč cache.
        const levelsToLoad = level ? [level] : ['dont_know', 'learning', 'know'];
        const cacheLevels  = level ? [level] : ['dont_know', 'know'];  // cache sa ukladá len pre tieto
        try {
            const res = await fetch('/api/v1/words/test/start', {
                method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
                body: JSON.stringify({ category_id:parseInt(categoryId), knowledge_levels:levelsToLoad, limit:1000, test_direction:testDirection })
            });
            if (!res.ok) throw new Error();
            const fresh = await res.json();
            if (!fresh.length) { showMessage('No words found for this level.','error'); document.getElementById('loading').style.display = 'none'; return; }
            // Ulož do cache (pri jednom levele per-level kľúč; pri "všetky" ulož pod každý level zvlášť nemáme rozdelené, tak ulož aspoň pod prvý).
            if (level) {
                saveOfflineWordsToCache(offlineWordsCacheKey({ categoryId, level, testDirection }), fresh);
            }
            words = fresh;
            prefetchOtherLevels(categoryId, level, testDirection);
        } catch {
            // Offline / chyba → zlúč cache z dostupných levelov.
            const seen = new Set();
            const merged = [];
            for (const lvl of cacheLevels) {
                const cached = loadOfflineWordsFromCache(offlineWordsCacheKey({ categoryId, level: lvl, testDirection }));
                if (!cached) continue;
                for (const w of cached) {
                    const id = w.id != null ? w.id : `${w.original_word}|${w.translation}`;
                    if (seen.has(id)) continue;
                    seen.add(id); merged.push(w);
                }
            }
            if (merged.length) { words = merged; showMessage('Offline: loaded from cache.','success'); }
            else { showMessage('Failed to load words (no cache).','error'); document.getElementById('loading').style.display = 'none'; return; }
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        updateProgress(); showCurrentWord();
    }

    async function prefetchOtherLevels(catId, currentLevel, dir) {
        if (!navigator.onLine) return;
        for (const lvl of window.WKOfflineCache.ALL_LEVELS.filter(l => l !== currentLevel)) {
            await prefetchCategoryLevel(catId, lvl, dir);
            await new Promise(r => setTimeout(r, 300));
        }
    }

    /* ── FLASHCARD ── */
    function showCurrentWord() {
        if (!words.length || currentIndex >= words.length) return;
        const w = words[currentIndex];
        const card = document.getElementById('flashcard');
        card.classList.remove('flipped'); isFlipped = false;
        document.getElementById('cardContent').textContent = w.original_word;
        document.getElementById('cardLabel').textContent   = 'Word';
        updateNavigationButtons();
    }

    function flipCard() {
        if (!words.length) return;
        const card = document.getElementById('flashcard');
        if (!isFlipped) {
            card.classList.add('flipped');
            document.getElementById('cardContent').textContent = words[currentIndex].translation;
            document.getElementById('cardLabel').textContent   = 'Translation';
        }
        isFlipped = !isFlipped;
    }

    function nextWord() {
        if (currentIndex < words.length - 1) { currentIndex++; updateProgress(); showCurrentWord(); }
        else { showMessage("You've reviewed all words! 🎉",'success'); stopAutoPlay(); }
    }

    function previousWord() {
        if (currentIndex > 0) { currentIndex--; updateProgress(); showCurrentWord(); }
    }

    function updateProgress() {
        const pct = ((currentIndex + 1) / words.length) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = `${currentIndex + 1} / ${words.length}`;
    }

    function updateNavigationButtons() {
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === words.length - 1;
    }

    /* ── AUTO PLAY ── */
    function startAutoPlay() {
        if (!words.length || isAutoPlaying) return;
        isAutoPlaying = true;
        shuffledIndices = Array.from({length:words.length},(_,i)=>i);
        for (let i = shuffledIndices.length-1; i > 0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [shuffledIndices[i],shuffledIndices[j]] = [shuffledIndices[j],shuffledIndices[i]];
        }
        autoPlayIndex = 0;
        document.getElementById('autoPlayBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        playCurrentWord();
    }

    function stopAutoPlay() {
        isAutoPlaying = false; speechSynth.cancel();
        shuffledIndices = []; autoPlayIndex = 0;
        if (words.length) showCurrentWord();
        document.getElementById('autoPlayBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    function playCurrentWord() {
        if (!isAutoPlaying || !words.length || autoPlayIndex >= shuffledIndices.length) { stopAutoPlay(); return; }
        const w = words[shuffledIndices[autoPlayIndex]];
        const progress = ((autoPlayIndex + 1) / words.length) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = `${autoPlayIndex + 1} / ${words.length}`;
        const card = document.getElementById('flashcard');
        card.classList.remove('flipped'); isFlipped = false;
        document.getElementById('cardContent').textContent = w.original_word;
        document.getElementById('cardLabel').textContent   = 'Word';
        try { speakWord(w.original_word, true); } catch {}
        setTimeout(() => {
            if (!isAutoPlaying) return;
            card.classList.add('flipped');
            document.getElementById('cardContent').textContent = w.translation;
            document.getElementById('cardLabel').textContent   = 'Translation';
            isFlipped = true;
            try { speakWord(w.translation, false); } catch {}
            setTimeout(() => {
                if (!isAutoPlaying) return;
                if (autoPlayIndex < shuffledIndices.length - 1) {
                    autoPlayIndex++;
                    setTimeout(() => { if (isAutoPlaying) playCurrentWord(); }, 500);
                } else { stopAutoPlay(); showMessage('Auto-play done! All words reviewed. 🎉','success'); }
            }, 3000);
        }, 3000);
    }

    function speakWord(text, isOriginal) {
        if (!speechSynth) return;
        speechSynth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = isOriginal ? originalLanguage : translationLanguage;
        speechSynth.speak(u);
    }

    /* ── MESSAGE ── */
    function showMessage(msg, type) {
        const el = document.getElementById('message');
        el.textContent = msg; el.className = `msg ${type}`;
        setTimeout(() => { el.style.display = 'none'; el.className = 'msg'; }, 5000);
    }

    /* ── LOGOUT ── */
    function logout() { localStorage.removeItem('access_token'); window.location.href = '/'; }
</script>
<script>
    let deferredPrompt;
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            if (reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
            reg.addEventListener('updatefound', () => {
                const sw = reg.installing;
                if (sw) sw.addEventListener('statechange', () => { if(sw.state==='installed') sw.postMessage({type:'SKIP_WAITING'}); });
            });
        }).catch(err => console.error('SW error:',err));
    }
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault(); deferredPrompt = e;
        const btn = document.getElementById('installBtn');
        if (btn) btn.style.display = 'inline-flex';
    });
    document.getElementById('installBtn')?.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt(); await deferredPrompt.userChoice;
        deferredPrompt = null; document.getElementById('installBtn').style.display = 'none';
    });
</script>
<script src="/static/js/cookie-notice.js"></script>
</body>
