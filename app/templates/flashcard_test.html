<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Flashcard Test" data-sk="Test kartičiek">Flashcard Test</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4079ff">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/css/fonts.css">

    <!-- Apply dark mode before first paint -->
    <script>
        if (localStorage.getItem('darkMode') === 'true')
            document.documentElement.setAttribute('data-theme', 'dark');
    </script>

    <style>
        :root {
            --primary: #4079ff;
            --accent:  #40ffaa;
            --grad:    linear-gradient(135deg, #4079ff, #40ffaa);
            --bg:      #f4f7fe;
            --card:    #ffffff;
            --text:    #2d3748;
            --muted:   #718096;
            --border:  #e2e8f0;
            --shadow:  0 10px 30px rgba(0,0,0,.08);
        }
        [data-theme="dark"] {
            --bg:   #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted:#94a3b8;
            --border:#334155;
            --shadow:0 10px 30px rgba(0,0,0,.35);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 1.25rem;
            overflow-x: hidden;
            transition: background .3s, color .3s;
        }

        /* Background */
        .bg-shapes { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .shape { position: absolute; color: var(--primary); opacity: .07; font-weight: bold; user-select: none; animation: floatUp linear infinite; }
        @keyframes floatUp {
            0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
            10%  { opacity: .4; }
            90%  { opacity: .4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Main card */
        .test-card {
            width: 100%; max-width: 620px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 2rem;
            opacity: 0; transform: translateY(20px);
            animation: cardPop .7s cubic-bezier(.2,.8,.2,1) forwards;
        }
        @keyframes cardPop { to { opacity: 1; transform: translateY(0); } }

        /* Card top bar */
        .card-topbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.4rem; flex-wrap: wrap; gap: .5rem;
        }
        .back-link {
            font-size: .85rem; color: var(--muted); text-decoration: none;
            display: flex; align-items: center; gap: 4px; transition: color .2s;
        }
        .back-link:hover { color: var(--primary); }
        .topbar-right { display: flex; align-items: center; gap: .4rem; }
        .lang-mini { display: flex; gap: 3px; }
        .lang-mini button, .icon-btn {
            padding: .25rem .6rem; border: 1px solid var(--border);
            background: var(--card); border-radius: 7px; font-size: .72rem;
            font-weight: 700; cursor: pointer; color: var(--muted); transition: all .2s;
        }
        .lang-mini button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .icon-btn { font-size: .9rem; padding: .28rem .6rem; }
        .icon-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* Category + user info */
        .test-meta { margin-bottom: 1.4rem; }
        .test-meta h1 {
            font-size: 1.3rem; font-weight: 800; letter-spacing: -.02em;
            background: var(--grad); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: .25rem;
        }
        .test-meta .user-line {
            font-size: .78rem; color: var(--muted);
        }

        /* Direction toggle */
        .direction-row {
            display: flex; gap: .5rem; margin-bottom: 1.25rem; flex-wrap: wrap;
        }
        .dir-btn {
            flex: 1; min-width: 130px;
            padding: .5rem .75rem;
            border: 1.5px solid var(--border); border-radius: 10px;
            background: var(--card); color: var(--muted); font-size: .8rem;
            font-weight: 600; cursor: pointer; text-align: center; transition: all .2s;
        }
        .dir-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(64,121,255,.06); }

        /* Progress */
        .progress-wrap { margin-bottom: 1.25rem; }
        .progress-label { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: .35rem; }
        .progress-bar-bg { height: 6px; background: var(--border); border-radius: 50px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--grad); border-radius: 50px; transition: width .4s ease; width: 0%; }

        /* Flashcard */
        .flashcard {
            background: var(--bg); border: 2px solid var(--border);
            border-radius: 20px; padding: 2.5rem 1.75rem;
            text-align: center; min-height: 200px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer; transition: all .3s; user-select: none;
        }
        .flashcard:hover { border-color: var(--primary); transform: translateY(-2px); }
        .flashcard.flipped { border-color: var(--primary); background: linear-gradient(135deg,rgba(64,121,255,.04),rgba(64,255,170,.04)); }

        .word-lang { font-size: .7rem; color: var(--muted); font-weight: 700; letter-spacing: .07em; text-transform: uppercase; margin-bottom: .5rem; }
        .word-main { font-size: 2.2rem; font-weight: 800; color: var(--primary); line-height: 1.2; display: flex; align-items: center; gap: .6rem; }
        .speak-btn { font-size: 1.3rem; cursor: pointer; background: none; border: none; line-height: 1; padding: 0; flex-shrink: 0; transition: transform .2s; }
        .speak-btn:hover { transform: scale(1.15); }

        .translation-block { margin-top: 1.1rem; padding-top: 1.1rem; border-top: 1px solid var(--border); width: 100%; }
        .trans-lang { font-size: .7rem; color: var(--muted); font-weight: 700; letter-spacing: .07em; text-transform: uppercase; margin-bottom: .35rem; }
        .word-trans { font-size: 1.9rem; font-weight: 700; color: var(--text); display: flex; align-items: center; justify-content: center; gap: .5rem; }

        .flip-hint { color: var(--muted); font-size: .8rem; margin-top: 1rem; }

        /* Answer buttons */
        .action-buttons { display: flex; gap: .7rem; margin-top: 1.1rem; }
        .action-btn {
            flex: 1; padding: .9rem; border: none; border-radius: 14px;
            font-size: .95rem; font-weight: 700; cursor: pointer;
            transition: all .2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            opacity: 0; transform: translateY(8px);
        }
        .action-btn.visible { opacity: 1; transform: translateY(0); }
        .btn-dont { background: #fff1f0; color: #c62828; border: 2px solid #ffcdd2; }
        .btn-dont:hover { background: #ffebee; border-color: #ef9a9a; transform: translateY(-2px); }
        .btn-know { background: #f1f8e9; color: #2e7d32; border: 2px solid #c8e6c9; }
        .btn-know:hover { background: #e8f5e9; border-color: #a5d6a7; transform: translateY(-2px); }
        [data-theme="dark"] .btn-dont { background: rgba(198,40,40,.15); border-color: rgba(198,40,40,.3); }
        [data-theme="dark"] .btn-know { background: rgba(46,125,50,.15); border-color: rgba(46,125,50,.3); }

        /* Loading / empty */
        .loading-msg, .empty-msg {
            text-align: center; padding: 3rem 1rem;
            color: var(--muted); font-size: 1rem;
        }
        .empty-msg a { color: var(--primary); font-weight: 700; text-decoration: none; }

        /* Results */
        .results-screen { display: none; text-align: center; padding: .25rem 0; }
        .score-circle {
            width: 110px; height: 110px; border-radius: 50%;
            background: var(--grad); display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0 auto 1.4rem; box-shadow: 0 8px 20px rgba(64,121,255,.3);
        }
        .score-pct { font-size: 1.8rem; font-weight: 800; color: #fff; line-height: 1; }
        .score-lbl { font-size: .68rem; color: rgba(255,255,255,.85); font-weight: 700; }
        .result-title { font-size: 1.4rem; font-weight: 800; margin-bottom: .4rem; }
        .result-msg { color: var(--muted); font-size: .88rem; margin-bottom: 1.5rem; line-height: 1.6; }
        .result-stats { display: flex; gap: .65rem; justify-content: center; margin-bottom: 1.75rem; }
        .stat-chip { padding: .45rem 1rem; border-radius: 50px; font-size: .83rem; font-weight: 700; }
        .stat-know { background: #f1f8e9; color: #2e7d32; }
        .stat-dont { background: #fff1f0; color: #c62828; }
        [data-theme="dark"] .stat-know { background: rgba(46,125,50,.2); color: #81c784; }
        [data-theme="dark"] .stat-dont { background: rgba(198,40,40,.2); color: #ef9a9a; }

        .cta-primary {
            display: block; width: 100%; padding: .95rem;
            background: var(--grad); color: #fff;
            font-size: .98rem; font-weight: 700; border: none;
            border-radius: 14px; cursor: pointer; text-decoration: none;
            text-align: center; transition: all .25s;
            margin-bottom: .7rem; box-shadow: 0 4px 14px rgba(64,121,255,.35);
        }
        .cta-primary:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(64,121,255,.45); }
        .cta-secondary-row { display: flex; gap: .65rem; justify-content: center; flex-wrap: wrap; }
        .cta-outline {
            padding: .6rem 1.2rem; border: 2px solid var(--border);
            border-radius: 10px; background: none; color: var(--muted);
            font-size: .85rem; font-weight: 700; cursor: pointer; text-decoration: none;
            transition: all .2s;
        }
        .cta-outline:hover { border-color: var(--primary); color: var(--primary); }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: .75rem; }
            .test-card { padding: 1.4rem; border-radius: 20px; }
            .word-main { font-size: 1.75rem; }
            .word-trans { font-size: 1.5rem; }
            .flashcard { padding: 2rem 1.25rem; min-height: 175px; }
        }
    </style>
</head>
<body>

<div class="bg-shapes" id="bgShapes"></div>

<div class="test-card">

    <!-- TOP BAR -->
    <div class="card-topbar">
        <a href="javascript:history.back()" class="back-link" id="backLink">← Back</a>
        <div class="topbar-right">
            <div class="lang-mini">
                <button data-lang="en">EN</button>
                <button data-lang="sk">SK</button>
            </div>
            <button class="icon-btn" id="darkToggle" title="Dark mode">🌙</button>
        </div>
    </div>

    <!-- META -->
    <div class="test-meta">
        <h1 id="testTitle">
            {% if category %}{{ category.name }}{% else %}All words{% endif %}
        </h1>
        <div class="user-line">
            <span id="labelLoggedIn">Logged in as</span>: <strong>{{ email }}</strong>
        </div>
    </div>

    <!-- DIRECTION TOGGLE -->
    <div class="direction-row" id="directionRow">
        <button class="dir-btn active" id="dirFwd" onclick="setDirection('original_to_translation')">
            <span id="dirFwdLabel">Original → Translation</span>
        </button>
        <button class="dir-btn" id="dirRev" onclick="setDirection('translation_to_original')">
            <span id="dirRevLabel">Translation → Original</span>
        </button>
    </div>

    <!-- TEST SCREEN -->
    <div id="testScreen">
        <div class="progress-wrap">
            <div class="progress-label">
                <span id="progressText"></span>
                <span id="scoreText"></span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="word-lang" id="wordLang"></div>
            <div class="word-main">
                <span id="wordText"></span>
                <button class="speak-btn" onclick="speakWord(event)">🔊</button>
            </div>
            <div class="translation-block" id="translationBlock" style="display:none;">
                <div class="trans-lang" id="transLang"></div>
                <div class="word-trans">
                    <span id="transText"></span>
                    <button class="speak-btn" onclick="speakTrans(event)">🔊</button>
                </div>
            </div>
            <div class="flip-hint" id="flipHint"></div>
        </div>

        <div class="action-buttons">
            <button class="action-btn btn-dont" id="btnDont" onclick="answer(false)"></button>
            <button class="action-btn btn-know" id="btnKnow" onclick="answer(true)"></button>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div class="results-screen" id="resultsScreen">
        <div class="score-circle">
            <div class="score-pct" id="scorePct">--%</div>
            <div class="score-lbl" id="scoreLbl"></div>
        </div>
        <div class="result-title" id="resultTitle"></div>
        <p class="result-msg" id="resultMsg"></p>
        <div class="result-stats">
            <div class="stat-chip stat-know" id="statKnow"></div>
            <div class="stat-chip stat-dont" id="statDont"></div>
        </div>
        <div class="cta-secondary-row">
            <button class="cta-outline" onclick="restartTest()" id="ctaRetry"></button>
            <a href="/dashboard" class="cta-outline" id="ctaDashboard"></a>
        </div>
    </div>

    <!-- LOADING / EMPTY -->
    <div class="loading-msg" id="loadingMsg" style="display:none;"></div>
    <div class="empty-msg" id="emptyMsg" style="display:none;"></div>

</div>

<script src="/static/js/offline-cache.js"></script>
<script>
/* ── CONFIG from server ── */
const CAT_ID    = {{ category.id if category else 'null' }};
const CAT_NAME  = "{{ category.name if category else '' }}";
const LEVEL_RAW = "{{ level or '' }}";

/* ── LABELS ── */
const L = {
    en: {
        back:       '← Back',
        loggedIn:   'Logged in as',
        dirFwd:     'Original → Translation',
        dirRev:     'Translation → Original',
        wordNum:    (i,t) => `Word ${i} / ${t}`,
        scoreStr:   (k,d) => `✅ ${k}   😕 ${d}`,
        flipHint:   '👆 Click to reveal translation',
        flipHintRev:'👆 Click to reveal original',
        btnDont:    "😕 Don't know",
        btnKnow:    '✅ I know',
        scoreLbl:   'accuracy',
        statKnow:   n => `✅ ${n} know`,
        statDont:   n => `😕 ${n} don't know`,
        results: {
            high: { title:'🌟 Excellent!',        msg:'Great result — you know most of the words. Keep it up!' },
            mid:  { title:'💪 Good job!',          msg:'Solid progress! Keep practising the words you missed.' },
            low:  { title:'📚 Keep practising!',  msg:"Don't worry — with regular practice you'll get there. Try again!" },
        },
        retry:       '🔁 Try again',
        dashboard:   '← Dashboard',
        loading:     'Loading words…',
        noWords:     'No words found for this test. <a href="/dashboard">Back to Dashboard</a>',
    },
    sk: {
        back:       '← Späť',
        loggedIn:   'Prihlásený ako',
        dirFwd:     'Originál → Preklad',
        dirRev:     'Preklad → Originál',
        wordNum:    (i,t) => `Slovíčko ${i} / ${t}`,
        scoreStr:   (k,d) => `✅ ${k}   😕 ${d}`,
        flipHint:   '👆 Klikni pre zobrazenie prekladu',
        flipHintRev:'👆 Klikni pre zobrazenie originálu',
        btnDont:    '😕 Neviem',
        btnKnow:    '✅ Viem',
        scoreLbl:   'úspešnosť',
        statKnow:   n => `✅ ${n} viem`,
        statDont:   n => `😕 ${n} neviem`,
        results: {
            high: { title:'🌟 Výborné!',          msg:'Výborný výsledok — väčšinu slovíčok vieš. Tak ďalej!' },
            mid:  { title:'💪 Dobrý výsledok!',   msg:'Dobrý pokrok! Pokračuj v precvičovaní slovíčok, ktoré ti nešli.' },
            low:  { title:'📚 Ešte treba trénovať!', msg:'Nevadí — s pravidelným opakovaním to zvládneš. Skús to znova!' },
        },
        retry:       '🔁 Skúsiť znova',
        dashboard:   '← Dashboard',
        loading:     'Načítavam slovíčka…',
        noWords:     'Pre tento test sa nenašli žiadne slovíčka. <a href="/dashboard">Späť na Dashboard</a>',
    }
};

/* ── STATE ── */
let lang         = localStorage.getItem('preferredLang') || 'en';
let direction    = 'original_to_translation';
let words        = [];
let idx          = 0;
let scoreKnow    = 0;
let scoreDont    = 0;
let isFlipped    = false;
let answers      = [];   // { word_id, is_correct }

/* ── LANGUAGE ── */
function setLang(l) {
    lang = l;
    localStorage.setItem('preferredLang', l);
    document.querySelectorAll('.lang-mini button').forEach(b =>
        b.classList.toggle('active', b.getAttribute('data-lang') === l));
    applyLabels();
}

function applyLabels() {
    const lbl = L[lang];
    document.getElementById('backLink').textContent      = lbl.back;
    document.getElementById('labelLoggedIn').textContent = lbl.loggedIn;
    document.getElementById('dirFwdLabel').textContent   = lbl.dirFwd;
    document.getElementById('dirRevLabel').textContent   = lbl.dirRev;
    document.getElementById('btnDont').textContent       = lbl.btnDont;
    document.getElementById('btnKnow').textContent       = lbl.btnKnow;
    document.getElementById('ctaRetry').textContent      = lbl.retry;
    document.getElementById('ctaDashboard').textContent  = lbl.dashboard;
    if (words.length) updateProgressUI();
}

/* ── DARK MODE ── */
function toggleDark() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('darkMode', !isDark);
}

/* ── TEST DIRECTION ── */
function setDirection(dir) {
    direction = dir;
    document.getElementById('dirFwd').classList.toggle('active', dir === 'original_to_translation');
    document.getElementById('dirRev').classList.toggle('active', dir === 'translation_to_original');
    restartTest();
}

/* ── LOAD WORDS ── */
async function loadWords() {
    document.getElementById('testScreen').style.display = 'none';
    document.getElementById('resultsScreen').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'none';
    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('loadingMsg').textContent = L[lang].loading;

    // Determine which levels to load
    let levels;
    if (LEVEL_RAW === 'know') {
        levels = ['know'];
    } else if (LEVEL_RAW === 'dont_know') {
        levels = ['dont_know', 'learning'];  // treat legacy 'learning' as dont_know
    } else {
        levels = ['dont_know', 'learning', 'know'];
    }

    const body = { knowledge_levels: levels, limit: 1000, test_direction: direction };
    if (CAT_ID) body.category_id = CAT_ID;

    let data = null;

    try {
        if (!navigator.onLine) throw new Error('offline');
        const res = await fetch('/api/v1/words/test/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
    } catch (e) {
        // Sieť zlyhala / offline → skús offline cache.
        console.warn('[WK] test/start zlyhal, skúšam offline cache:', e);
        data = loadFromOfflineCache(levels);
    }

    document.getElementById('loadingMsg').style.display = 'none';

    if (!data || data.length === 0) {
        document.getElementById('emptyMsg').style.display = 'block';
        document.getElementById('emptyMsg').innerHTML = L[lang].noWords;
        return;
    }

    words = shuffleArr(data);
    idx = 0; scoreKnow = 0; scoreDont = 0; answers = [];
    document.getElementById('testScreen').style.display = 'block';
    showCard();
}

/* Zlúči slovíčka z offline cache pre požadované levely (per-level kľúče).
   Cache sa prefetchuje len pre 'original_to_translation'. Pri reverznom smere
   prehodíme polia na klientovi (rovnako ako to robí backend pri swap_direction). */
function loadFromOfflineCache(levels) {
    if (!CAT_ID || !window.WKOfflineCache) return null;
    const seen = new Set();
    const merged = [];
    const isRev = direction === 'translation_to_original';
    // offline-cache ukladá len 'dont_know' a 'know'; 'learning' mapuj na 'dont_know'.
    const cacheLevels = [...new Set(levels.map(l => l === 'learning' ? 'dont_know' : l))];
    for (const level of cacheLevels) {
        const key = WKOfflineCache.offlineWordsCacheKey({
            categoryId: CAT_ID,
            level,
            testDirection: WKOfflineCache.DEFAULT_TEST_DIRECTION  // vždy 'original_to_translation'
        });
        const cached = WKOfflineCache.loadOfflineWordsFromCache(key);
        if (!cached) continue;
        for (const w of cached) {
            const id = w.id != null ? w.id : `${w.original_word}|${w.translation}`;
            if (seen.has(id)) continue;
            seen.add(id);
            if (isRev) {
                // Prehoď polia (zhodné so serverovým swap_direction).
                merged.push({
                    ...w,
                    original_word: w.translation,
                    translation: w.original_word,
                    language_from: w.language_to,
                    language_to: w.language_from
                });
            } else {
                merged.push(w);
            }
        }
    }
    return merged.length ? merged : null;
}

/* ── CARD FLOW ── */
function shuffleArr(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function showCard() {
    isFlipped = false;
    const w = words[idx];
    const isRev = direction === 'translation_to_original';

    document.getElementById('wordLang').textContent  = w.language_from;
    document.getElementById('wordText').textContent  = w.original_word;
    document.getElementById('transLang').textContent = w.language_to;
    document.getElementById('transText').textContent = w.translation;
    document.getElementById('translationBlock').style.display = 'none';
    document.getElementById('flipHint').textContent = isRev ? L[lang].flipHintRev : L[lang].flipHint;
    document.getElementById('flipHint').style.display = 'flex';
    document.getElementById('flashcard').classList.remove('flipped');

    ['btnDont','btnKnow'].forEach(id => document.getElementById(id).classList.remove('visible'));
    updateProgressUI();
}

function updateProgressUI() {
    const lbl = L[lang];
    document.getElementById('progressText').textContent = lbl.wordNum(idx + 1, words.length);
    document.getElementById('scoreText').innerHTML = lbl.scoreStr(scoreKnow, scoreDont);
    document.getElementById('progressFill').style.width = `${(idx / words.length) * 100}%`;
}

function flipCard() {
    if (isFlipped) return;
    isFlipped = true;
    document.getElementById('flashcard').classList.add('flipped');
    document.getElementById('translationBlock').style.display = 'block';
    document.getElementById('flipHint').style.display = 'none';
    setTimeout(() => ['btnDont','btnKnow'].forEach(id =>
        document.getElementById(id).classList.add('visible')), 150);
}

function answer(know) {
    if (!isFlipped) return;
    if (know) scoreKnow++; else scoreDont++;
    answers.push({ word_id: words[idx].id, is_correct: know });
    idx++;
    if (idx >= words.length) showResults();
    else showCard();
}

/* ── RESULTS ── */
async function showResults() {
    document.getElementById('testScreen').style.display = 'none';
    const el = document.getElementById('resultsScreen');
    el.style.display = 'block';

    const total = words.length;
    const pct   = total ? Math.round((scoreKnow / total) * 100) : 0;
    const tier  = pct >= 80 ? 'high' : pct >= 50 ? 'mid' : 'low';
    const lbl   = L[lang];

    document.getElementById('scorePct').textContent   = pct + '%';
    document.getElementById('scoreLbl').textContent   = lbl.scoreLbl;
    document.getElementById('resultTitle').textContent = lbl.results[tier].title;
    document.getElementById('resultMsg').textContent   = lbl.results[tier].msg;
    document.getElementById('statKnow').textContent   = lbl.statKnow(scoreKnow);
    document.getElementById('statDont').textContent   = lbl.statDont(scoreDont);

    // Submit results to API in background
    submitResults();
}

async function submitResults() {
    if (!answers.length) return;
    try {
        await fetch('/api/v1/words/test/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(answers)
        });
    } catch (e) { console.error('Submit error:', e); }
}

function restartTest() {
    document.getElementById('resultsScreen').style.display = 'none';
    loadWords();
}

/* ── SPEECH ── */
function speakWord(e) { e.stopPropagation(); speak(document.getElementById('wordText').textContent); }
function speakTrans(e) { e.stopPropagation(); speak(document.getElementById('transText').textContent); }
function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = .85;
    window.speechSynthesis.speak(u);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowUp' || e.key === ' ') { e.preventDefault(); flipCard(); }
    else if (e.key === 'ArrowLeft')  answer(false);
    else if (e.key === 'ArrowRight') answer(true);
});

/* ── BACKGROUND ── */
(function() {
    const bg = document.getElementById('bgShapes');
    const chars = ['A','B','C','?','!','Ω','文','①'];
    function make() {
        const el = document.createElement('div');
        el.className = 'shape';
        el.textContent = chars[Math.floor(Math.random() * chars.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (Math.random() * 22 + 10) + 'px';
        el.style.animationDuration = (Math.random() * 12 + 10) + 's';
        bg.appendChild(el);
        setTimeout(() => el.remove(), 22000);
    }
    for (let i = 0; i < 10; i++) setTimeout(make, i * 400);
    setInterval(make, 1500);
})();

/* ── INIT ── */
document.querySelectorAll('.lang-mini button').forEach(b =>
    b.addEventListener('click', () => setLang(b.getAttribute('data-lang'))));
document.getElementById('darkToggle').addEventListener('click', toggleDark);

setLang(lang);    // apply labels
loadWords();
</script>

</body>
