<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vocabulary Test - WordKeeper</title>

<!-- PWA Meta Tags -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="WordKeeper">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#4079ff">

<!-- ✅ OPRAVA 1: Dark mode sa aplikuje OKAMŽITE z localStorage, pred akýmkoľvek renderingom -->
<script>
  try {
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  } catch (e) {
    console.warn("Storage access denied in incognito mode");
  }
</script>

<style>

:root {
  --primary-green: #4CAF50;
  --light-green: #E8F5E9;
  --dark-green: #2E7D32;
  --white: #FFFFFF;
  --light-gray: #F5F5F5;
  --gray: #9E9E9E;
  --red: #f44336;
  --orange: #ff9800;
  --bg-color: var(--light-gray);
  --text-color: #333;
  --card-bg: var(--light-gray);
}

[data-theme="dark"] {
  --bg-color: #121212;
  --text-color: #e0e0e0;
  --card-bg: #2d2d2d;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
  background: var(--bg-color);
  color: var(--text-color);
}

.header {
  background: var(--card-bg);
  padding: 1rem 2rem;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 1.5rem;
  font-weight: bold;
  color: #4CAF50;
}

.language-selector {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0.5rem;
}

.language-selector select {
  padding: 0.5rem;
  border: 1px solid #ddd;
  border-radius: 4px;
  background: var(--card-bg);
  color: var(--text-color);
}

.container {
  max-width: 800px;
  margin: 2rem auto;
  padding: 0 2rem;
}

.test-config {
  background: var(--card-bg);
  padding: 2rem;
  border-radius: 10px;
  margin-bottom: 2rem;
}

.form-group {
  margin-bottom: 1rem;
}

label {
  display: block;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

select, input {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 1rem;
  background: var(--card-bg);
  color: var(--text-color);
}

.level-badges {
  display: flex;
  gap: 1rem;
  margin-top: 0.5rem;
}

.level-badge {
  padding: 0.5rem 1rem;
  border-radius: 20px;
  cursor: pointer;
  border: 2px solid transparent;
}

.level-badge.selected {
  border-color: #333;
}

.level-dont_know { background: #ffebee; color: #c62828; }
.level-learning { background: #fff3e0; color: #ef6c00; }
.level-know { background: #fff9c4; color: #f57f17; }
.level-mastered { background: #e8f5e8; color: #2e7d32; }

button {
  background: #4CAF50;
  color: white;
  padding: 1rem 2rem;
  border: none;
  border-radius: 5px;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 1rem;
}

button:hover {
  background: #45a049;
}

#installBtn {
  background: var(--primary-green);
  margin-right: 1rem;
}

.test-card {
  background: var(--card-bg);
  padding: 2rem;
  border-radius: 10px;
  margin-bottom: 1rem;
  text-align: center;
}

.word-display {
  font-size: 2rem;
  margin-bottom: 2rem;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}

.speaker-icon {
  font-size: 2rem;
  cursor: pointer;
  color: #4CAF50;
  transition: color 0.3s ease;
}

.speaker-icon:hover {
  color: #2E7D32;
}

.answer-input {
  width: 100%;
  padding: 1rem;
  font-size: 1.2rem;
  border: 2px solid #ddd;
  border-radius: 5px;
  margin-bottom: 1rem;
  background: var(--card-bg);
  color: var(--text-color);
  box-sizing: border-box;
}

.test-controls {
  display: flex;
  gap: 1rem;
  justify-content: center;
}

.btn-correct { background: #4CAF50; }
.btn-incorrect { background: #f44336; }
.btn-skip { background: #ff9800; }

.results {
  background: var(--card-bg);
  padding: 2rem;
  border-radius: 10px;
  text-align: center;
}

.progress-bar {
  background: #ddd;
  height: 10px;
  border-radius: 5px;
  margin: 1rem 0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #4CAF50;
  transition: width 0.3s;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">WORDKEEPER</div>
  <div class="nav-links">
    <div class="language-selector">
      <label for="speechLangSelect" style="font-size: 0.9rem; margin-right: 0.5rem;">Speech:</label>
      <select id="speechLangSelect">
        <option value="en-US">English</option>
        <option value="sk-SK">Slovenčina</option>
        <option value="de-DE">Deutsch</option>
        <option value="fr-FR">Français</option>
        <option value="es-ES">Español</option>
      </select>
    </div>
    <!-- ✅ OPRAVA 2: themeToggle teraz ukladá do localStorage -->
    <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: none; color: var(--text-color); cursor: pointer; font-size: 1.2rem; margin-right: 1rem;">🌙 Dark Mode</button>
    <button id="installBtn" style="display: none; padding: 0.5rem 1rem; font-size: 0.9rem;">📲 Inštalovať</button>
    <a href="/dashboard">Dashboard</a>
    <a href="/profile">Profile</a>
  </div>
</div>

<div class="container">

  <!-- Test Configuration -->
  <div class="test-config" id="testConfig">
    <h1>Start Vocabulary Test</h1>
    <div class="form-group">
      <label for="categorySelect">Category:</label>
      <select id="categorySelect">
        <option value="">All Categories</option>
      </select>
    </div>
    <div class="form-group">
      <label>Knowledge Levels to Test:</label>
      <div class="level-badges">
        <div class="level-badge level-dont_know selected" data-level="dont_know">Don't Know</div>
        <div class="level-badge level-learning selected" data-level="learning">Learning</div>
        <div class="level-badge level-know selected" data-level="know">Know</div>
        <div class="level-badge level-mastered" data-level="mastered">Mastered</div>
      </div>
    </div>
    <div class="form-group">
      <label for="testLimit">Number of Words:</label>
      <input type="number" id="testLimit" value="20" min="5" max="100">
    </div>
    <div class="form-group">
      <label>Test Direction:</label>
      <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem;">
          <input type="radio" name="testDirection" value="original_to_translation" checked>
          Original → Translation
        </label>
        <label style="display: flex; align-items: center; gap: 0.5rem;">
          <input type="radio" name="testDirection" value="translation_to_original">
          Translation → Original
        </label>
      </div>
    </div>
    <button onclick="startTest()">Start Test</button>
  </div>

  <!-- Test Interface -->
  <div class="test-interface" id="testInterface" style="display: none;">
    <div class="test-card">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="word-display" id="currentWord"></div>
      <input type="text" class="answer-input" id="answerInput" placeholder="Enter translation...">
      <div class="test-controls">
        <button class="btn-correct" onclick="submitAnswer(true)">Correct</button>
        <button class="btn-incorrect" onclick="submitAnswer(false)">Incorrect</button>
        <button class="btn-skip" onclick="skipWord()">Skip</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="testResults" style="display: none;">
    <h1>Test Completed!</h1>
    <div id="resultsStats"></div>
    <button onclick="restartTest()">Take Another Test</button>
  </div>

</div>

<script>

let currentTest = null;
let currentWordIndex = 0;
let testResults = [];
let categories = [];
let deferredPrompt;

// ✅ FIX: Zachytenie inštalácie MUSÍ byť mimo DOMContentLoaded, aby sme ho nezmeškali
window.addEventListener('beforeinstallprompt', (e) => {
  console.log('beforeinstallprompt event fired');
  // Zabránime automatickému zobrazeniu
  e.preventDefault();
  // Uložíme udalosť
  deferredPrompt = e;
  // Zobrazíme naše tlačidlo (ak už existuje v DOM)
  const installBtn = document.getElementById('installBtn');
  if (installBtn) installBtn.style.display = 'inline-block';
});

window.addEventListener('appinstalled', () => {
  const installBtn = document.getElementById('installBtn');
  if (installBtn) installBtn.style.display = 'none';
  deferredPrompt = null;
  console.log('PWA was installed');
});

// ✅ OPRAVA 3: Inicializácia stavu tlačidla podľa localStorage
document.addEventListener('DOMContentLoaded', async function() {
  await loadCategories();
  // Nastav správny text tlačidla podľa aktuálneho stavu
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('themeToggle').textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';

  // ✅ Registrácia Service Workera (Dôležité pre PWA inštaláciu)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered for Test page.'))
        .catch(err => console.log('SW registration failed: ', err));
    });
  }

  // ✅ Vyčistený click handler pre inštaláciu
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBtn').style.display = 'none';
  });
});

async function loadCategories() {
  const token = localStorage.getItem('access_token');
  try {
    const response = await fetch('/api/v1/categories', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (response.ok) {
      const data = await response.json();
      categories = data.categories;
      const select = document.getElementById('categorySelect');
      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category.id;
        option.textContent = category.name + ` (${category.word_count} words)`;
        select.appendChild(option);
      });
    }
  } catch (error) {
    console.error('Error loading categories:', error);
  }
}

async function startTest() {
  const categoryId = document.getElementById('categorySelect').value;
  const limit = document.getElementById('testLimit').value;
  const selectedLevels = Array.from(document.querySelectorAll('.level-badge.selected'))
    .map(badge => badge.dataset.level);

  if (selectedLevels.length === 0) {
    alert('Please select at least one knowledge level');
    return;
  }

  const testDirection = document.querySelector('input[name="testDirection"]:checked').value;
  const testConfig = {
    category_id: categoryId ? parseInt(categoryId) : null,
    knowledge_levels: selectedLevels,
    limit: parseInt(limit),
    test_direction: testDirection
  };

  const token = localStorage.getItem('access_token');
  try {
    const response = await fetch('/api/v1/words/test/start', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(testConfig)
    });

    if (response.ok) {
      currentTest = await response.json();
      if (currentTest.length === 0) {
        alert('No words found for the selected criteria');
        return;
      }
      currentWordIndex = 0;
      testResults = [];
      document.getElementById('testConfig').style.display = 'none';
      document.getElementById('testInterface').style.display = 'block';
      showNextWord();
    } else {
      alert('Error starting test');
    }
  } catch (error) {
    console.error('Error starting test:', error);
  }
}

function showNextWord() {
  if (currentWordIndex >= currentTest.length) {
    finishTest();
    return;
  }

  const word = currentTest[currentWordIndex];
  const testDirection = document.querySelector('input[name="testDirection"]:checked').value;
  const isReverse = testDirection === 'translation_to_original';
  const questionWord = word.original_word;
  const placeholder = isReverse ? 'Enter original word...' : 'Enter translation...';

  document.getElementById('currentWord').innerHTML = `
    <span>${questionWord}</span>
    <span class="speaker-icon" onclick="speakWord('${questionWord}'); event.stopPropagation();">🔊</span>
  `;
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').placeholder = placeholder;
  document.getElementById('answerInput').focus();

  const progress = ((currentWordIndex) / currentTest.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
}

function submitAnswer(isCorrect) {
  const word = currentTest[currentWordIndex];
  testResults.push({ word_id: word.id, is_correct: isCorrect });
  currentWordIndex++;
  showNextWord();
}

function skipWord() {
  currentWordIndex++;
  showNextWord();
}

async function finishTest() {
  const token = localStorage.getItem('access_token');
  try {
    const response = await fetch('/api/v1/words/test/submit', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(testResults)
    });
    if (response.ok) {
      const results = await response.json();
      showResults(results);
    }
  } catch (error) {
    console.error('Error submitting test results:', error);
  }
}

function showResults(results) {
  document.getElementById('testInterface').style.display = 'none';
  document.getElementById('testResults').style.display = 'block';
  const correctAnswers = testResults.filter(r => r.is_correct).length;
  const totalAnswers = testResults.length;
  const percentage = Math.round((correctAnswers / totalAnswers) * 100);
  document.getElementById('resultsStats').innerHTML = `
    <h2>${correctAnswers} / ${totalAnswers} Correct (${percentage}%)</h2>
    <p>Your vocabulary knowledge has been updated!</p>
  `;
}

function restartTest() {
  document.getElementById('testResults').style.display = 'none';
  document.getElementById('testConfig').style.display = 'block';
}

// Level selection
document.querySelectorAll('.level-badge').forEach(badge => {
  badge.addEventListener('click', function() {
    this.classList.toggle('selected');
  });
});

function speakWord(word, lang = null) {
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(word);
    const selectedLang = lang || document.getElementById('speechLangSelect').value;
    utterance.lang = selectedLang;
    utterance.rate = 0.8;
    utterance.pitch = 1;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  } else {
    alert('Speech synthesis not supported in this browser');
  }
}

// ✅ OPRAVA 4: toggleTheme ukladá do localStorage + nastavuje na documentElement
async function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newMode = !isDark;
  const themeToggle = document.getElementById('themeToggle');

  if (newMode) {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('darkMode', 'true');
    themeToggle.textContent = '☀️ Light Mode';
  } else {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('darkMode', 'false');
    themeToggle.textContent = '🌙 Dark Mode';
  }

  try {
    await fetch('/api/user/dark-mode', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dark_mode: newMode })
    });
  } catch (error) {
    console.error('Error updating dark mode preference:', error);
  }
}

</script>

</body>
</html>
